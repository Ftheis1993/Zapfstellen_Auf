<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProtocolApp Pro - Ultimate Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProtocolApp">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --bg-input: #27272a;
            --accent-red: #e11d48;
            --accent-red-glow: rgba(225, 29, 72, 0.15);
            --accent-blue: #0ea5e9;
            --accent-orange: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #3f3f46;
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px 15px 40px 15px;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { width: 100%; max-width: 600px; margin: 0 auto; }

        .header-date { text-align: center; color: var(--text-muted); font-size: 0.9em; margin-bottom: 25px; font-weight: 500; }
        .header-date span { color: var(--text-main); font-weight: 600; margin-left: 6px; background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }

        .project-section { display: flex; gap: 10px; margin-bottom: 30px; }
        .project-input-group { flex-grow: 1; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 12px 15px; display: flex; align-items: center; }
        .project-input-group:focus-within { border-color: var(--accent-red); background-color: #1f1f22; }
        .project-input-group input { flex-grow: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; font-family: inherit; font-weight: 600; outline: none; width: 100%; }

        .action-btn { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; color: var(--text-main); font-size: 1.25em; cursor: pointer; flex-shrink: 0; }
        .action-btn:active { transform: scale(0.92); background-color: var(--bg-input); }

        .divider { display: flex; align-items: center; color: var(--text-muted); margin: 30px 0 15px 0; font-weight: 700; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; }
        .divider::after { content: ''; flex: 1; margin-left: 15px; border-bottom: 1px solid var(--border-color); }

        .accordion { margin-bottom: 12px; border-radius: var(--radius-lg); background-color: var(--bg-card); border: 1px solid var(--border-color); overflow: hidden; }
        .accordion-header { padding: 16px 20px; font-size: 1.05em; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; }
        .accordion.active { border-left: 4px solid var(--accent-red); border-color: #52525b; }
        .accordion.active .accordion-header i { transform: rotate(180deg); color: var(--accent-red); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .accordion-inner { padding: 5px 20px 20px 20px; border-top: 1px solid var(--border-color); background-color: #141417; }

        .form-row { display: flex; margin-top: 15px; align-items: flex-start; }
        .icon-circle { width: 36px; height: 36px; border-radius: var(--radius-md); display: flex; justify-content: center; align-items: center; color: white; margin-right: 15px; flex-shrink: 0; }
        .icon-orange { background: linear-gradient(135deg, #ff9f0a, #f97316); }
        .icon-green { background: linear-gradient(135deg, #30d158, #10b981); }
        .icon-blue { background: linear-gradient(135deg, #0a84ff, #0284c7); }
        
        .input-fields { flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        .input-group { display: flex; flex-direction: column; }
        .input-group label { font-weight: 600; font-size: 0.8em; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; }
        .input-group input, .input-group textarea, .input-group select { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-main); padding: 12px 14px; outline: none; font-family: inherit; font-size: 16px; transition: var(--transition); }
        .input-group input:focus, .input-group textarea:focus, .input-group select:focus { border-color: var(--accent-red); }
        .input-group textarea { resize: vertical; min-height: 80px; }

        .feature-toggles-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px; }
        .feature-btn { font-size: 0.85em; font-weight: 600; padding: 12px 10px; text-align: center; border-radius: var(--radius-md); background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; user-select: none; }
        .feature-btn.active { border-color: var(--accent-red); background-color: rgba(225, 29, 72, 0.15); color: var(--text-main); }

        .photo-upload-label { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--bg-input); border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 20px; color: var(--text-muted); font-weight: 600; cursor: pointer; gap: 10px; }
        .photo-upload-label:active { background-color: var(--bg-card); border-color: var(--accent-red); color: var(--accent-red); }
        .photo-upload-label i { font-size: 1.8em; color: var(--text-main); }
        .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .photo-item { position: relative; aspect-ratio: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-color); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; }
        .photo-delete-btn { position: absolute; top: 5px; right: 5px; background: var(--accent-red); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8em; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        #kachelContainer { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
        .bereich-kachel { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .bereich-kachel:active { border-color: var(--accent-red); transform: scale(0.98); }
        .kachel-info h3 { margin: 0 0 6px 0; font-size: 1.1em; font-weight: 600; color: var(--text-main); }
        .kachel-info p { margin: 0; font-size: 0.88em; color: var(--text-muted); line-height: 1.4; }
        .kachel-icon { width: 40px; height: 40px; border-radius: var(--radius-md); background-color: var(--bg-input); display: flex; justify-content: center; align-items: center; color: var(--accent-red); font-size: 1em; }

        .new-area-btn { background-color: transparent; border: 2px dashed var(--border-color); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.05em; font-weight: 600; color: var(--text-muted); cursor: pointer; width: 100%; }
        .new-area-btn:active { background-color: var(--bg-input); border-color: var(--accent-red); color: var(--text-main); }

        .summary-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; margin-top: 15px; display: flex; flex-direction: column; gap: 14px; }
        .summary-stat { display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; border-bottom: 1px solid var(--border-color); }
        .summary-stat:last-child { padding-bottom: 0; border-bottom: none; }
        .stat-label { font-size: 0.9em; font-weight: 600; color: var(--text-muted); }
        .stat-value { font-size: 1.15em; font-weight: 700; color: var(--text-main); background: var(--bg-input); padding: 4px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content { background-color: var(--bg-dark); border-top: 1px solid var(--border-color); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 25px 20px 40px 20px; display: flex; flex-direction: column; gap: 24px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; color: var(--text-main); }
        .modal-header h2 { margin: 0; font-size: 1.3em; font-weight: 700; }
        .close-btn { background: var(--bg-input); border: 1px solid var(--border-color); width: 36px; height: 36px; border-radius: 50%; color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .modal-section-title { font-size: 0.85em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin: 0 0 12px 0; letter-spacing: 0.05em; }
        
        .sanitar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sanitar-item-btn { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 14px 15px; color: var(--text-main); font-size: 0.9em; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .sanitar-item-btn:active { background-color: var(--bg-card); border-color: var(--accent-red); }
        .sanitar-item-btn i { color: var(--accent-red); font-size: 1em; opacity: 0.8; }
        
        .added-items-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .added-item { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.95em; }
        .item-left-side { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .item-name { font-weight: 600; color: var(--text-main); }
        
        .water-toggles { display: flex; gap: 8px; }
        .water-btn { font-size: 0.75em; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-sm); background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; user-select: none; }
        .water-btn.kw.active { border-color: var(--accent-blue); background-color: rgba(14, 165, 233, 0.15); color: var(--accent-blue); }
        .water-btn.ww.active { border-color: var(--accent-orange); background-color: rgba(249, 115, 22, 0.15); color: var(--accent-orange); }

        .zapfstellen-container { display: flex; flex-direction: column; gap: 8px; background: var(--bg-input); padding: 12px 14px; border-radius: var(--radius-sm); width: 100%; }
        .zapfstellen-row { display: flex; align-items: center; justify-content: space-between; font-size: 0.9em; color: var(--text-muted); }
        .zapfstellen-row label { font-weight: 600; }
        .zapfstellen-input { width: 60px; background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 5px; padding: 6px 8px; text-align: center; outline: none; font-size: 16px; font-weight: 700; }
        .zapfstellen-input:focus { border-color: var(--accent-red); }

        .item-controls { display: flex; align-items: center; margin-left: 15px; }
        .remove-btn { color: var(--text-muted); font-size: 1.2em; padding: 10px; cursor: pointer; }
        .remove-btn:active { color: var(--accent-red); }
        
        .save-modal-btn { background-color: var(--accent-red); color: white; border: none; border-radius: var(--radius-md); padding: 16px; font-size: 1.05em; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; }
        .delete-area-btn { background: none; border: none; color: var(--text-muted); font-size: 0.9em; cursor: pointer; text-align: center; text-decoration: underline; width: 100%; padding: 10px; }
        
        /* Reset App Button */
        .reset-app-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px; width: 100%; border-radius: var(--radius-md); margin-top: 20px; font-size: 0.9em; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-date">
            Datum: <span id="currentDate">Lade...</span>
        </div>

        <div class="project-section">
            <div class="project-input-group">
                <input type="text" id="projektName" placeholder="Projektname / Bauvorhaben..." oninput="saveData()">
            </div>
            <button class="action-btn" title="PDF Erstellen" onclick="exportToPDF()">
                <i class="fas fa-file-pdf" style="color: var(--accent-red);"></i>
            </button>
        </div>

        <div class="divider">Stammdaten</div>

        <div class="accordion" id="accKunde">
            <div class="accordion-header" onclick="toggleAccordion('accKunde')">
                Kunde & Ansprechpartner <i class="fas fa-chevron-down"></i>
            </div>
            <div class="accordion-content">
                <div class="accordion-inner">
                    <div class="form-row">
                        <div class="icon-circle icon-orange"><i class="fas fa-user"></i></div>
                        <div class="input-fields">
                            <div class="input-group"><label>Firma / Name</label><input type="text" id="k-firma" oninput="saveData()"></div>
                            <div class="input-group"><label>Ansprechpartner</label><input type="text" id="k-kontakt" oninput="saveData()"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="icon-circle icon-green"><i class="fas fa-home"></i></div>
                        <div class="input-fields">
                            <div class="input-group"><label>Straße & Hausnummer</label><input type="text" id="k-strasse" oninput="saveData()"></div>
                            <div class="input-group"><label>PLZ & Stadt</label><input type="text" id="k-stadt" oninput="saveData()"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="accordion" id="accObjekt">
            <div class="accordion-header" onclick="toggleAccordion('accObjekt')">
                Objekt <i class="fas fa-chevron-down"></i>
            </div>
            <div class="accordion-content">
                <div class="accordion-inner">
                    <div class="form-row">
                        <div class="icon-circle icon-blue"><i class="fas fa-building"></i></div>
                        <div class="input-fields">
                            <div class="input-group"><label>Objektname</label><input type="text" id="o-firma" oninput="saveData()"></div>
                            <div class="input-group"><label>Gebäudeteil</label><input type="text" id="o-gebaeude" oninput="saveData()"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="icon-circle icon-green"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="input-fields">
                            <div class="input-group"><label>Straße & Hausnummer</label><input type="text" id="o-strasse" oninput="saveData()"></div>
                            <div class="input-group"><label>PLZ & Stadt</label><input type="text" id="o-stadt" oninput="saveData()"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="divider">Erfassung</div>
        <div id="kachelContainer"></div>

        <button class="new-area-btn" onclick="createNewArea()">
            <i class="fas fa-plus"></i> Neuer Gebäudebereich
        </button>

        <div class="divider">Gesamtübersicht</div>
        <div class="summary-card">
            <div class="summary-stat">
                <span class="stat-label">Entnahmestellen gesamt</span>
                <span class="stat-value" id="total-objects">0</span>
            </div>
            <div class="summary-stat">
                <span class="stat-label" style="color: var(--accent-blue);">KW-Anschlüsse gesamt</span>
                <span class="stat-value" id="total-kw" style="color: var(--accent-blue);">0x</span>
            </div>
            <div class="summary-stat">
                <span class="stat-label" style="color: var(--accent-orange);">WW-Anschlüsse gesamt</span>
                <span class="stat-value" id="total-ww" style="color: var(--accent-orange);">0x</span>
            </div>
        </div>
        
        <button class="reset-app-btn" onclick="resetApp()"><i class="fas fa-trash-alt"></i> Alle Daten zurücksetzen</button>
    </div>

    <div class="modal-overlay" id="areaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bereich konfigurieren</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>

            <div class="input-group">
                <label>Bezeichnung des Bereichs</label>
                <input type="text" id="modalAreaName" oninput="updateCurrentAreaName(this.value)">
            </div>

            <div class="input-group">
                <label>Notizen / Bemerkungen</label>
                <textarea id="modalAreaNotes" placeholder="Zustand, Mängel festhalten..." oninput="updateCurrentAreaNotes(this.value)"></textarea>
            </div>

            <div class="input-group">
                <label>Optionen / Dämmung</label>
                <div class="feature-toggles-grid">
                    <span class="feature-btn" id="feat-zirkulation" onclick="toggleAreaFeature('zirkulation')">Zirkulation</span>
                    <span class="feature-btn" id="feat-kwGedaemmt" onclick="toggleAreaFeature('kwGedaemmt')">KW Gedämmt</span>
                    <span class="feature-btn" id="feat-wwGedaemmt" onclick="toggleAreaFeature('wwGedaemmt')">WW Gedämmt</span>
                    <span class="feature-btn" id="feat-zkGedaemmt" onclick="toggleAreaFeature('zkGedaemmt')">ZK Gedämmt</span>
                </div>
            </div>

            <div>
                <p class="modal-section-title">Fotodokumentation</p>
                <label for="cameraInput" class="photo-upload-label">
                    <i class="fas fa-camera"></i>
                    <span>Foto aufnehmen / wählen</span>
                </label>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;" onchange="handlePhotoUpload(this)" multiple>
                <div class="photo-grid" id="photoGrid"></div>
            </div>

            <div>
                <p class="modal-section-title">Entnahmestelle hinzufügen</p>
                <div class="sanitar-grid" id="sanitarGrid"></div>
            </div>

            <div>
                <p class="modal-section-title">Einzelauflistung</p>
                <ul class="added-items-list" id="addedItemsList"></ul>
            </div>

            <button class="save-modal-btn" onclick="closeModal()">Fertig & Speichern</button>
            <button class="delete-area-btn" onclick="deleteCurrentArea()">Diesen Bereich löschen</button>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

        function toggleAccordion(id) {
            const acc = document.getElementById(id);
            const content = acc.querySelector('.accordion-content');
            if (acc.classList.contains('active')) {
                acc.classList.remove('active');
                content.style.maxHeight = '0';
            } else {
                acc.classList.add('active');
                content.style.maxHeight = content.scrollHeight + 'px';
            }
        }

        let buildingAreas = [];
        let currentEditingId = null;

        const defaultSanitaryObjects = ["Waschbecken", "Dusche", "Ausgussbecken", "Waschrinne", "Außenzapfstelle", "Zapfstelle", "Heizungsbefüllung", "Systemtrenner", "Stopfen", "Kappe"];

        // --- LOCAL STORAGE (AUTO SAVE) ---
        function saveData() {
            const data = {
                projektName: document.getElementById('projektName').value,
                kFirma: document.getElementById('k-firma').value,
                kKontakt: document.getElementById('k-kontakt').value,
                kStrasse: document.getElementById('k-strasse').value,
                kStadt: document.getElementById('k-stadt').value,
                oFirma: document.getElementById('o-firma').value,
                oGebaeude: document.getElementById('o-gebaeude').value,
                oStrasse: document.getElementById('o-strasse').value,
                oStadt: document.getElementById('o-stadt').value,
                buildingAreas: buildingAreas
            };
            localStorage.setItem('protocolAppDataPro', JSON.stringify(data));
        }

        function loadData() {
            const stored = localStorage.getItem('protocolAppDataPro');
            if(stored) {
                try {
                    const data = JSON.parse(stored);
                    document.getElementById('projektName').value = data.projektName || '';
                    document.getElementById('k-firma').value = data.kFirma || '';
                    document.getElementById('k-kontakt').value = data.kKontakt || '';
                    document.getElementById('k-strasse').value = data.kStrasse || '';
                    document.getElementById('k-stadt').value = data.kStadt || '';
                    document.getElementById('o-firma').value = data.oFirma || '';
                    document.getElementById('o-gebaeude').value = data.oGebaeude || '';
                    document.getElementById('o-strasse').value = data.oStrasse || '';
                    document.getElementById('o-stadt').value = data.oStadt || '';
                    buildingAreas = data.buildingAreas || [];
                    renderAreas();
                } catch(e) { console.error("Could not load data", e); }
            }
        }

        function resetApp() {
            if(confirm("ACHTUNG: Möchtest du wirklich alle eingegebenen Daten und Fotos unwiderruflich löschen?")) {
                localStorage.removeItem('protocolAppDataPro');
                location.reload();
            }
        }
        // ---------------------------------

        function initSanitarGrid() {
            const grid = document.getElementById('sanitarGrid');
            grid.innerHTML = '';
            defaultSanitaryObjects.forEach(obj => {
                const btn = document.createElement('div');
                btn.className = 'sanitar-item-btn';
                btn.innerHTML = `<span>${obj}</span> <i class="fas fa-plus"></i>`;
                btn.onclick = () => addSanitaryObject(obj);
                grid.appendChild(btn);
            });
            const customBtn = document.createElement('div');
            customBtn.className = 'sanitar-item-btn custom-btn';
            customBtn.innerHTML = `<span>+ Eigenes...</span> <i class="fas fa-plus"></i>`;
            customBtn.onclick = createCustomObject;
            grid.appendChild(customBtn);
        }

        function createCustomObject() {
            const name = prompt("Bezeichnung der eigenen Entnahmestelle:");
            if (name && name.trim() !== "") addSanitaryObject(name.trim());
        }

        function createNewArea() {
            const newId = Date.now().toString();
            buildingAreas.push({
                id: newId,
                name: "Neuer Gebäudebereich",
                notes: "",
                features: { zirkulation: false, kwGedaemmt: false, wwGedaemmt: false, zkGedaemmt: false },
                items: [],
                photos: []
            });
            saveData();
            renderAreas();
            openModal(newId);
        }

        function updateOverallSummary() {
            let totalObjects = 0; let totalKW = 0; let totalWW = 0;
            buildingAreas.forEach(area => {
                totalObjects += area.items.length;
                area.items.forEach(item => {
                    if (item.name === "Waschrinne") {
                        totalKW += (item.kwCount !== undefined ? item.kwCount : 2);
                        totalWW += (item.wwCount !== undefined ? item.wwCount : 2);
                    } else {
                        if (item.kw) totalKW++;
                        if (item.ww) totalWW++;
                    }
                });
            });
            document.getElementById('total-objects').textContent = totalObjects;
            document.getElementById('total-kw').textContent = totalKW + "x";
            document.getElementById('total-ww').textContent = totalWW + "x";
        }

        function renderAreas() {
            const container = document.getElementById('kachelContainer');
            container.innerHTML = '';
            
            buildingAreas.forEach(area => {
                let total = area.items.length;
                let text = total === 0 ? 'Keine Entnahmestellen' : total === 1 ? '1 Entnahmestelle' : total + ' Entnahmestellen';
                let activeFeatures = [];
                if (area.features) {
                    if (area.features.zirkulation) activeFeatures.push("Zirkulation");
                    if (area.features.kwGedaemmt) activeFeatures.push("KW Gedämmt");
                    if (area.features.wwGedaemmt) activeFeatures.push("WW Gedämmt");
                    if (area.features.zkGedaemmt) activeFeatures.push("ZK Gedämmt");
                }
                
                let featuresPreview = activeFeatures.length > 0 ? `<br><span style="color: var(--accent-red); font-size: 0.82em; font-weight: 600;">🏷️ ${activeFeatures.join(', ')}</span>` : '';
                let photoPreview = (area.photos && area.photos.length > 0) ? ` | <span style="color:var(--text-main);">📸 ${area.photos.length} Foto(s)</span>` : '';
                let notesPreview = area.notes ? `<br><span style="color: var(--text-muted); font-size: 0.85em; display:inline-block; margin-top:4px;">📝 ${area.notes.substring(0, 38)}${area.notes.length > 38 ? '...' : ''}</span>` : '';

                const kachel = document.createElement('div');
                kachel.className = 'bereich-kachel';
                kachel.onclick = () => openModal(area.id);
                kachel.innerHTML = `
                    <div class="kachel-info">
                        <h3>${area.name}</h3>
                        <p>${text}${photoPreview}${featuresPreview}${notesPreview}</p>
                    </div>
                    <div class="kachel-icon"><i class="fas fa-chevron-right"></i></div>
                `;
                container.appendChild(kachel);
            });
            updateOverallSummary();
        }

        function openModal(areaId) {
            currentEditingId = areaId;
            const area = buildingAreas.find(a => a.id === areaId);
            document.getElementById('modalAreaName').value = area.name;
            document.getElementById('modalAreaNotes').value = area.notes;
            
            if (!area.features) area.features = { zirkulation: false, kwGedaemmt: false, wwGedaemmt: false, zkGedaemmt: false };
            if (!area.photos) area.photos = [];

            ['zirkulation', 'kwGedaemmt', 'wwGedaemmt', 'zkGedaemmt'].forEach(f => {
                const btn = document.getElementById(`feat-${f}`);
                if (area.features[f]) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            renderPhotos();
            renderAddedItemsList();
            document.getElementById('areaModal').classList.add('active');
        }

        function toggleAreaFeature(featureKey) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area) {
                area.features[featureKey] = !area.features[featureKey];
                const btn = document.getElementById(`feat-${featureKey}`);
                if (area.features[featureKey]) btn.classList.add('active');
                else btn.classList.remove('active');
                saveData();
            }
        }

        function closeModal() {
            document.getElementById('areaModal').classList.remove('active');
            renderAreas();
        }

        function updateCurrentAreaName(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.name = val || "Unbenannter Bereich"; saveData(); }
        }

        function updateCurrentAreaNotes(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.notes = val; saveData(); }
        }

        // --- BILD KOMPRESSION FÜR STABILITÄT ---
        function handlePhotoUpload(input) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (input.files && input.files.length > 0) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 800; // Verhindert RAM-Abstürze
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                            } else {
                                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            area.photos.push(canvas.toDataURL('image/jpeg', 0.6)); // 60% Qualität
                            renderPhotos();
                            saveData();
                        }
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
            input.value = ""; 
        }

        function renderPhotos() {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            if (area && area.photos) {
                area.photos.forEach((photoData, index) => {
                    grid.innerHTML += `
                        <div class="photo-item">
                            <img src="${photoData}" alt="Doku Foto">
                            <div class="photo-delete-btn" onclick="deletePhoto(${index})"><i class="fas fa-times"></i></div>
                        </div>
                    `;
                });
            }
        }

        function deletePhoto(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos) {
                area.photos.splice(index, 1);
                renderPhotos();
                saveData();
            }
        }

        function addSanitaryObject(objName) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const newItem = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 4),
                name: objName,
                kw: false,
                ww: false
            };
            if (objName === "Waschrinne") {
                newItem.zapfstellen = 2;
                newItem.kwCount = 2;
                newItem.wwCount = 2;
            }
            area.items.push(newItem);
            saveData();
            renderAddedItemsList();
        }

        function removeSanitaryObject(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            area.items.splice(index, 1);
            saveData();
            renderAddedItemsList();
        }

        function toggleWater(index, type) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) {
                area.items[index][type] = !area.items[index][type];
                saveData();
                renderAddedItemsList();
            }
        }

        function updateZapfstellen(index, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) {
                let val = parseInt(value);
                area.items[index].zapfstellen = isNaN(val) || val < 1 ? 1 : val;
                saveData();
            }
        }

        function updateWaschrinneWater(index, type, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) {
                let val = parseInt(value);
                let safeVal = isNaN(val) || val < 0 ? 0 : val;
                if (type === 'kw') area.items[index].kwCount = safeVal;
                if (type === 'ww') area.items[index].wwCount = safeVal;
                saveData();
            }
        }

        function deleteCurrentArea() {
            if (confirm('Möchtest du diesen Gebäudebereich komplett löschen?')) {
                buildingAreas = buildingAreas.filter(a => a.id !== currentEditingId);
                saveData();
                closeModal();
            }
        }

        function renderAddedItemsList() {
            const list = document.getElementById('addedItemsList');
            list.innerHTML = '';
            const area = buildingAreas.find(a => a.id === currentEditingId);
            
            if (area.items.length === 0) {
                list.innerHTML = '<li class="added-item" style="color:var(--text-muted); justify-content:center; font-style:italic; background: transparent; border-style: dashed;">Noch keine Entnahmestellen hinzugefügt</li>';
                return;
            }

            area.items.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'added-item';

                let waterSectionHTML = '';
                if (item.name === "Waschrinne") {
                    waterSectionHTML = `
                        <div class="zapfstellen-container">
                            <div class="zapfstellen-row">
                                <label>Zapfstellen gesamt:</label>
                                <input type="number" min="1" class="zapfstellen-input" value="${item.zapfstellen || 2}" onchange="updateZapfstellen(${index}, this.value)">
                            </div>
                            <div class="zapfstellen-row" style="margin-top: 8px;">
                                <label style="color: var(--accent-blue);">Anzahl KW:</label>
                                <input type="number" min="0" class="zapfstellen-input" style="border-color: var(--border-color);" value="${item.kwCount !== undefined ? item.kwCount : 2}" onchange="updateWaschrinneWater(${index}, 'kw', this.value)">
                            </div>
                            <div class="zapfstellen-row" style="margin-top: 8px;">
                                <label style="color: var(--accent-orange);">Anzahl WW:</label>
                                <input type="number" min="0" class="zapfstellen-input" style="border-color: var(--border-color);" value="${item.wwCount !== undefined ? item.wwCount : 2}" onchange="updateWaschrinneWater(${index}, 'ww', this.value)">
                            </div>
                        </div>
                    `;
                } else {
                    waterSectionHTML = `
                        <div class="water-toggles">
                            <span class="water-btn kw ${item.kw ? 'active' : ''}" onclick="toggleWater(${index}, 'kw')">KW</span>
                            <span class="water-btn ww ${item.ww ? 'active' : ''}" onclick="toggleWater(${index}, 'ww')">WW</span>
                        </div>
                    `;
                }

                li.innerHTML = `
                    <div class="item-left-side">
                        <span class="item-name">${item.name}</span>
                        ${waterSectionHTML}
                    </div>
                    <div class="item-controls">
                        <i class="fas fa-trash-can remove-btn" onclick="removeSanitaryObject(${index})"></i>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // --- PDF EXPORT ---
        function exportToPDF() {
            const projektName = document.getElementById('projektName').value.trim() || 'Unbenanntes Projekt';
            const datum = document.getElementById('currentDate').textContent;
            
            const printElement = document.createElement('div');
            printElement.style.padding = '30px';
            printElement.style.fontFamily = "'Arial', 'Helvetica', sans-serif";
            printElement.style.color = '#222';
            printElement.style.backgroundColor = '#fff';

            let htmlStructure = `
                <div style="border-bottom: 4px solid #e11d48; padding-bottom: 15px; margin-bottom: 25px; display: table; width: 100%;">
                    <div style="display: table-cell; vertical-align: middle;">
                        <h1 style="margin: 0; font-size: 24px; font-weight: 700; color: #111; text-transform: uppercase;">Technisches Datenblatt</h1>
                        <p style="margin: 4px 0 0 0; font-size: 13px; color: #555;">Projekt-Erfassungsprotokoll</p>
                    </div>
                    <div style="display: table-cell; text-align: right; vertical-align: middle; font-size: 12px; color: #444;">
                        <strong>Datum:</strong> ${datum}<br>
                        <strong>Projekt-ID:</strong> PRJ-${Math.floor(1000 + Math.random() * 9000)}
                    </div>
                </div>

                <div style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; margin-bottom: 30px;">
                    <span style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: #e11d48;">Projektbezeichnung</span>
                    <div style="font-size: 18px; font-weight: 700; color: #0f172a; margin-top: 2px;">${projektName}</div>
                </div>

                <div style="display: table; width: 100%; margin-bottom: 35px; table-layout: fixed; border-spacing: 15px 0;">
                    <div style="display: table-cell; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; vertical-align: top;">
                        <h3 style="margin: 0 0 10px 0; font-size: 13px; border-bottom: 2px solid #64748b; padding-bottom: 4px; text-transform: uppercase; color: #475569;">Kunde</h3>
                        <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
                            <tr><td style="padding: 3px 0; width:40%;">Firma:</td><td style="font-weight:600;">${document.getElementById('k-firma').value || '—'}</td></tr>
                            <tr><td style="padding: 3px 0;">Kontakt:</td><td>${document.getElementById('k-kontakt').value || '—'}</td></tr>
                            <tr><td style="padding: 3px 0;">Straße:</td><td>${document.getElementById('k-strasse').value || '—'}</td></tr>
                            <tr><td style="padding: 3px 0;">Ort:</td><td>${document.getElementById('k-stadt').value || '—'}</td></tr>
                        </table>
                    </div>

                    <div style="display: table-cell; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; vertical-align: top;">
                        <h3 style="margin: 0 0 10px 0; font-size: 13px; border-bottom: 2px solid #64748b; padding-bottom: 4px; text-transform: uppercase; color: #475569;">Objekt</h3>
                        <table style="width: 100%; font-size: 12px; border-collapse: collapse;">
                            <tr><td style="padding: 3px 0; width:40%;">Objekt:</td><td style="font-weight:600;">${document.getElementById('o-firma').value || '—'}</td></tr>
                            <tr><td style="padding: 3px 0;">Gebäude:</td><td>${document.getElementById('o-gebaeude').value || '—'}</td></tr>
                            <tr><td style="padding: 3px 0;">Straße:</td><td>${document.getElementById('o-strasse').value || '—'}</td></tr>
                            <tr><td style="padding: 3px 0;">Ort:</td><td>${document.getElementById('o-stadt').value || '—'}</td></tr>
                        </table>
                    </div>
                </div>
            `;

            let pdfObjectsCount = 0; let pdfKWCount = 0; let pdfWWCount = 0;

            if (buildingAreas.length > 0) {
                htmlStructure += `<h2 style="font-size: 16px; font-weight: 700; color: #1e293b; margin-bottom: 15px; border-bottom: 2px solid #cbd5e1; padding-bottom: 5px; text-transform: uppercase;">Gebäudebereiche & Dokumentation</h2>`;
                
                buildingAreas.forEach(area => {
                    pdfObjectsCount += area.items.length;
                    htmlStructure += `
                        <div style="margin-bottom: 25px; border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; page-break-inside: avoid;">
                            <div style="background-color: #18181b; padding: 10px 15px; font-weight: 700; font-size: 14px; color: #ffffff;">🏢 ${area.name}</div>
                            <div style="padding: 15px; background: #fff;">
                    `;
                    
                    if (area.items.length > 0) {
                        htmlStructure += `
                            <table style="width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 10px;">
                                <thead>
                                    <tr style="border-bottom: 2px solid #e2e8f0; text-align: left; color: #475569; font-size: 10px; text-transform: uppercase;">
                                        <th style="padding: 6px 8px; width: 55%;">Entnahmestelle</th>
                                        <th style="padding: 6px 8px; width: 45%; text-align: right;">Anschluss</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        area.items.forEach((item, idx) => {
                            const rowBg = idx % 2 === 0 ? '#f8fafc' : '#ffffff';
                            let detailInfo = ''; let waterBadgesHTML = '';

                            if (item.name === "Waschrinne") {
                                detailInfo = ` <br><span style="font-size: 10px; color:#64748b;">(${item.zapfstellen || 2} Zapfstellen)</span>`;
                                let kwMenge = item.kwCount !== undefined ? item.kwCount : 2;
                                let wwMenge = item.wwCount !== undefined ? item.wwCount : 2;
                                pdfKWCount += kwMenge; pdfWWCount += wwMenge;

                                let badges = [];
                                if (kwMenge > 0) badges.push(`<span style="background-color: #e0f2fe; color: #0369a1; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 2px; border: 1px solid #bae6fd;">${kwMenge}x KW</span>`);
                                if (wwMenge > 0) badges.push(`<span style="background-color: #ffedd5; color: #c2410c; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 2px; border: 1px solid #fed7aa;">${wwMenge}x WW</span>`);
                                waterBadgesHTML = badges.length > 0 ? badges.join('') : `-`;
                            } else {
                                if (item.kw) pdfKWCount++;
                                if (item.ww) pdfWWCount++;
                                let badges = [];
                                if (item.kw) badges.push(`<span style="background-color: #e0f2fe; color: #0369a1; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 2px; border: 1px solid #bae6fd;">KW</span>`);
                                if (item.ww) badges.push(`<span style="background-color: #ffedd5; color: #c2410c; padding: 2px 5px; border-radius: 4px; font-size: 9px; font-weight: 700; margin-left: 2px; border: 1px solid #fed7aa;">WW</span>`);
                                waterBadgesHTML = badges.length > 0 ? badges.join('') : `-`;
                            }

                            htmlStructure += `
                                <tr style="background-color: ${rowBg}; border-bottom: 1px solid #edf2f7;">
                                    <td style="padding: 8px; font-weight: 600; color: #1e293b;">${item.name}${detailInfo}</td>
                                    <td style="padding: 8px; text-align: right;">${waterBadgesHTML}</td>
                                </tr>
                            `;
                        });
                        htmlStructure += `</tbody></table>`;
                    }

                    let pdfFeatures = [];
                    if (area.features) {
                        if (area.features.zirkulation) pdfFeatures.push("Zirkulation");
                        if (area.features.kwGedaemmt) pdfFeatures.push("KW Gedämmt");
                        if (area.features.wwGedaemmt) pdfFeatures.push("WW Gedämmt");
                        if (area.features.zkGedaemmt) pdfFeatures.push("ZK Gedämmt");
                    }
                    if (pdfFeatures.length > 0) {
                        htmlStructure += `<div style="margin-top: 10px; font-size: 10px;">`;
                        pdfFeatures.forEach(feat => {
                            htmlStructure += `<span style="background-color: #f1f5f9; color: #334155; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-right: 6px; border: 1px solid #cbd5e1; display: inline-block;">🏷️ ${feat}</span>`;
                        });
                        htmlStructure += `</div>`;
                    }

                    if (area.notes && area.notes.trim() !== '') {
                        htmlStructure += `
                            <div style="margin-top: 12px; padding: 8px 10px; background-color: #fff1f2; border-left: 3px solid #e11d48; font-size: 11px; color: #1e293b; border-radius: 0 4px 4px 0;">
                                <strong style="color: #9f1239;">Notizen & Befund:</strong><br>${area.notes.replace(/\n/g, '<br>')}
                            </div>
                        `;
                    }

                    if (area.photos && area.photos.length > 0) {
                        htmlStructure += `
                            <div style="margin-top: 15px; border-top: 1px solid #e2e8f0; padding-top: 10px;">
                                <strong style="font-size: 11px; color: #475569;">Fotodokumentation (${area.photos.length} Bild/er):</strong>
                                <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
                        `;
                        area.photos.forEach(photoSrc => {
                            htmlStructure += `<img src="${photoSrc}" style="width: 140px; height: 140px; object-fit: cover; border-radius: 6px; border: 1px solid #cbd5e1;">`;
                        });
                        htmlStructure += `</div></div>`;
                    }
                    htmlStructure += `</div></div>`;
                });
            }

            htmlStructure += `
                <div style="margin-top: 35px; border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; page-break-inside: avoid;">
                    <div style="background-color: #e11d48; padding: 10px 15px; font-weight: 700; font-size: 13px; color: #ffffff; text-transform: uppercase;">
                        📊 Gesamtübersicht
                    </div>
                    <table style="width: 100%; border-collapse: collapse; font-size: 12px; background: #ffffff;">
                        <tr style="border-bottom: 1px solid #edf2f7;">
                            <td style="padding: 10px 15px; font-weight: 600;">Entnahmestellen gesamt:</td>
                            <td style="padding: 10px 15px; text-align: right; font-weight: 700; font-size: 13px;">${pdfObjectsCount}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid #edf2f7; background-color: #f8fafc;">
                            <td style="padding: 10px 15px; font-weight: 600; color: #0369a1;">Kaltwasser (KW) gesamt:</td>
                            <td style="padding: 10px 15px; text-align: right; font-weight: 700; color: #0369a1; font-size: 13px;">${pdfKWCount}x</td>
                        </tr>
                        <tr>
                            <td style="padding: 10px 15px; font-weight: 600; color: #c2410c;">Warmwasser (WW) gesamt:</td>
                            <td style="padding: 10px 15px; text-align: right; font-weight: 700; color: #c2410c; font-size: 13px;">${pdfWWCount}x</td>
                        </tr>
                    </table>
                </div>
                <div style="margin-top: 40px; border-top: 1px solid #e2e8f0; padding-top: 10px; text-align: center; font-size: 9px; color: #94a3b8;">
                    Generiert mit ProtocolApp Pro am ${datum}
                </div>
            `;

            printElement.innerHTML = htmlStructure;

            const opt = {
                margin:       10,
                filename:     `Protokoll_${projektName.replace(/[^a-zA-Z0-9]/g, '_')}.pdf`,
                image:        { type: 'jpeg', quality: 0.95 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(printElement).save();
        }

        // Init Load & PWA
        window.onload = () => {
            loadData();
            initSanitarGrid();
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA SW registriert.', reg))
                    .catch(err => console.error('SW Error:', err));
            });
        }
    </script>
</body>
</html>
