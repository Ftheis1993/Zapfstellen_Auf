<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProtocolApp</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProtocolApp">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* --- BLACK & RED DESIGN SYSTEM --- */
        :root {
            --bg-base: #000000;       /* Tiefschwarz */
            --bg-panel: #0f0f0f;      /* Sehr dunkles Grau für Karten */
            --bg-input: #1a1a1a;      /* Etwas helleres Grau für Inputs */
            --accent-primary: #ff0000; /* Kräftiges Rot */
            --accent-primary-hover: #cc0000; /* Dunkleres Rot */
            --accent-red: #ff3333;
            --text-dark: #ffffff;     /* Weißer Text */
            --text-dim: #999999;      /* Grauer Text */
            --border-light: #2a2a2a;  /* Dezente Ränder */
            --radius-soft: 16px;
            --radius-inner: 10px;
            --shadow-soft: 0 4px 20px rgba(255, 0, 0, 0.05); /* Leichter roter Glow */
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.8);
            --transition-smooth: all 0.2s ease;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-dark);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0; 
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        /* --- UI OVERLAYS --- */
        #pdf-loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px); z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #pdf-loading-overlay.active { opacity: 1; pointer-events: auto; }
        #pdf-loading-overlay i { font-size: 3em; color: var(--accent-primary); margin-bottom: 20px; }
        #pdf-loading-overlay h3 { color: var(--text-dark); margin: 0 0 10px 0; font-size: 1.2em; font-weight: 600; }
        #pdf-loading-overlay p { color: var(--text-dim); text-align: center; font-size: 0.9em; }

        /* --- APP WRAPPER --- */
        .app-container { width: 100%; max-width: 600px; margin: 0 auto; padding: 30px 20px 100px 20px; }

        .brand-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 15px;
        }
        .brand-logo { font-size: 1.4em; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; text-transform: uppercase; }
        .brand-logo span { color: var(--accent-primary); }
        .date-badge { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 6px 12px; border-radius: 50px; font-size: 0.85em; font-weight: 500; color: var(--text-dim); }

        /* --- FORMS & PANELS --- */
        .project-panel {
            background: var(--bg-panel); border: 1px solid var(--border-light);
            border-radius: var(--radius-soft); padding: 25px; margin-bottom: 30px;
            box-shadow: var(--shadow-soft);
        }
        .input-block { margin-bottom: 20px; }
        .input-block:last-child { margin-bottom: 0; }
        .input-block label { display: block; font-size: 0.8em; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-block input, .input-block textarea {
            width: 100%; background: var(--bg-input); border: 1px solid transparent;
            color: var(--text-dark); padding: 14px 16px; border-radius: var(--radius-inner);
            font-family: inherit; font-size: 16px; font-weight: 500; outline: none;
            transition: var(--transition-smooth);
        }
        .input-block input:focus, .input-block textarea:focus { 
            background: #111; border-color: var(--accent-primary); 
            box-shadow: 0 0 0 3px rgba(255, 0, 0, 0.15); 
        }
        .input-block textarea { resize: vertical; min-height: 100px; line-height: 1.5; }

        .section-title { font-size: 1.1em; font-weight: 700; color: var(--text-dark); margin: 35px 0 15px 0; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- AREA CARDS --- */
        #kachelContainer { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .area-card {
            background: var(--bg-panel); border: 1px solid var(--border-light);
            border-radius: var(--radius-soft); padding: 20px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-card); transition: var(--transition-smooth);
        }
        .area-card:hover { border-color: #444; box-shadow: var(--shadow-soft); transform: translateY(-2px); }
        .area-card:active { transform: translateY(0); }
        .area-info h3 { margin: 0 0 6px 0; font-size: 1.1em; font-weight: 600; color: var(--text-dark); }
        .area-info p { margin: 0; font-size: 0.85em; color: var(--text-dim); }
        .area-arrow { color: #444; font-size: 1.2em; transition: var(--transition-smooth); }
        .area-card:hover .area-arrow { color: var(--accent-primary); transform: translateX(4px); }

        /* --- BUTTONS SYSTEM --- */
        .btn-primary, .btn-outline, .btn-danger, .btn-secondary {
            width: 100%; padding: 16px; font-size: 0.95em; font-weight: 600;
            border-radius: var(--radius-inner); cursor: pointer; text-align: center;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: var(--transition-smooth); margin-bottom: 12px; font-family: inherit;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-primary { background: var(--accent-primary); color: #fff; border: none; box-shadow: 0 4px 15px rgba(255, 0, 0, 0.2); }
        .btn-primary:active { background: var(--accent-primary-hover); transform: scale(0.98); }
        
        .btn-secondary { background: var(--bg-panel); color: var(--text-dark); border: 1px solid var(--border-light); box-shadow: var(--shadow-card); }
        .btn-secondary:active { background: var(--bg-input); border-color: #444; transform: scale(0.98); }
        
        .btn-outline { background: transparent; color: var(--accent-primary); border: 2px dashed #444; }
        .btn-outline:active { background: rgba(255, 0, 0, 0.1); border-color: var(--accent-primary); transform: scale(0.98); }
        
        .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid rgba(255, 51, 51, 0.3); margin-top: 40px; }
        .btn-danger:active { background: rgba(255, 51, 51, 0.1); border-color: var(--accent-red); }

        /* --- MODAL (SLIDE-UP OVERLAY) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-base); border-top: 2px solid var(--accent-primary); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 30px 20px 40px 20px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.8); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { margin: 0; font-size: 1.2em; font-weight: 700; color: var(--text-dark); text-transform: uppercase; }
        .close-btn { background: var(--bg-panel); border: 1px solid var(--border-light); color: var(--text-dark); width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.1em; cursor: pointer; transition: var(--transition-smooth); }
        .close-btn:hover { background: #222; color: var(--accent-primary); border-color: var(--accent-primary); }
        .close-btn:active { transform: scale(0.9); }

        /* --- PHOTO LOGISTICS --- */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .photo-item { border: 1px solid var(--border-light); background: var(--bg-panel); border-radius: var(--radius-inner); overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow-card); }
        .photo-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .photo-note { background: transparent; border: none; border-top: 1px solid var(--border-light); color: var(--accent-primary); padding: 12px; font-size: 0.85em; font-weight: 600; outline: none; width: 100%; text-align: center; }
        .photo-note::placeholder { color: var(--text-dim); font-weight: 400; }
        .photo-delete { position: absolute; top: 8px; right: 8px; background: rgba(0, 0, 0, 0.8); color: var(--text-dark); border: 1px solid var(--border-light); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-smooth); }
        .photo-delete:active { transform: scale(0.9); background: var(--accent-primary); border-color: var(--accent-primary); }

        /* --- ITEMS & OBJECT MANAGEMENT --- */
        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .item-btn { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 14px 10px; color: var(--text-dark); font-size: 0.85em; font-weight: 500; text-align: center; border-radius: var(--radius-inner); cursor: pointer; transition: var(--transition-smooth); }
        .item-btn:hover { border-color: #555; background: #1a1a1a; }
        .item-btn:active { border-color: var(--accent-primary); transform: scale(0.98); color: var(--accent-primary); }

        .added-list { list-style: none; padding: 0; margin: 0 0 25px 0; display: flex; flex-direction: column; gap: 10px; }
        .added-item { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: var(--radius-inner); padding: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; border-left: 3px solid var(--border-light); transition: var(--transition-smooth); }
        .added-item:hover { border-left-color: var(--accent-primary); }
        .item-name { font-weight: 600; font-size: 0.95em; color: var(--text-dark); flex-grow: 1; min-width: 120px; }
        .item-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        
        .toggle-btn { background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-dim); padding: 6px 12px; font-size: 0.8em; font-weight: 600; border-radius: 50px; cursor: pointer; transition: var(--transition-smooth); }
        /* Kaltwasser bleibt zur funktionellen Unterscheidung logisch Blau */
        .toggle-btn.active.kw { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-color: #3b82f6; }
        /* Warmwasser ist im Rot-Thema natürlich Rot */
        .toggle-btn.active.ww { background: rgba(255, 0, 0, 0.1); color: var(--accent-primary); border-color: var(--accent-primary); }

        .number-input { display: flex; align-items: center; gap: 4px; background: var(--bg-input); border: 1px solid var(--border-light); padding: 4px 8px; border-radius: 8px; }
        .number-input span { font-size: 0.75em; font-weight: 600; color: var(--text-dim); }
        .number-input input { background: transparent; border: none; color: var(--text-dark); width: 30px; text-align: center; font-size: 0.95em; font-weight: 600; outline: none; padding: 0; font-family: inherit;}
        
        .trash-btn { color: var(--text-dim); background: transparent; border: none; font-size: 1.1em; cursor: pointer; padding: 5px; margin-left: 4px; transition: var(--transition-smooth); }
        .trash-btn:hover { color: var(--accent-primary); }
        .trash-btn:active { transform: scale(0.8); }
    </style>
</head>
<body>

    <div id="pdf-loading-overlay">
        <i class="fas fa-circle-notch fa-spin"></i>
        <h3>PDF wird erstellt</h3>
        <p>Einen Moment bitte, das Dokument wird formatiert...</p>
    </div>

    <div class="app-container" id="main-app">
        <header class="brand-header">
            <div class="brand-logo">Protocol<span>App</span></div>
            <div class="date-badge" id="currentDate">--.--.----</div>
        </header>

        <div class="project-panel">
            <div class="input-block">
                <label>Projekt / Bauvorhaben</label>
                <input type="text" id="projektName" placeholder="Z.B. BVH Mustermann..." oninput="saveData()">
            </div>
        </div>

        <div class="section-title">Erfasste Bereiche</div>
        <div id="kachelContainer"></div>

        <button class="btn-outline" onclick="createNewArea()">
            <i class="fas fa-plus"></i> Neuen Bereich hinzufügen
        </button>

        <div class="section-title">Export & Protokolle</div>
        
        <button class="btn-primary" onclick="exportToPDF(false)">
            <i class="fas fa-file-pdf"></i> Komplettes Protokoll
        </button>
        
        <button class="btn-secondary" onclick="exportToPDF(true)">
            <i class="fas fa-list"></i> Nur Mengenübersicht
        </button>
        
        <button class="btn-danger" onclick="resetApp()">
            <i class="fas fa-trash-alt"></i> Alle Daten zurücksetzen
        </button>
    </div>

    <div class="modal-overlay" id="areaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bereich bearbeiten</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>

            <div class="input-block">
                <label>Name des Bereichs (z.B. Bad 1. OG)</label>
                <input type="text" id="modalAreaName" oninput="updateCurrentAreaName(this.value)">
            </div>

            <div class="input-block">
                <label>Mängel & Notizen</label>
                <textarea id="modalAreaNotes" placeholder="Besonderheiten oder Zustand festhalten..." oninput="updateCurrentAreaNotes(this.value)"></textarea>
            </div>

            <div class="section-title">Fotos & Dokumentation</div>
            <button class="btn-secondary" style="border-style: dashed; color: var(--text-dark); border-color: var(--border-light);" onclick="document.getElementById('cameraInput').click()">
                <i class="fas fa-camera" style="color: var(--accent-primary);"></i> Foto hinzufügen
            </button>
            <input type="file" id="cameraInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)" multiple>
            <div class="photo-grid" id="photoGrid"></div>

            <div class="section-title">Komponenten hinzufügen</div>
            <div class="item-grid" id="sanitarGrid"></div>

            <div class="section-title">Aktuelle Liste</div>
            <ul class="added-list" id="addedItemsList"></ul>

            <button class="btn-primary" onclick="closeModal()">Speichern & Schließen</button>
            <button class="btn-danger" style="margin-top: 20px; border: none; background: transparent;" onclick="deleteCurrentArea()">Diesen Bereich löschen</button>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

        let buildingAreas = [];
        let currentEditingId = null;

        const defaultSanitaryObjects = [
            "Waschbecken", "WC", "Dusche", "Badewanne",
            "Heizkörper", "Verteiler", "Spülbecken", "Zapfstelle"
        ];

        // --- CORE APPLICATION LOGIC ---
        function saveData() {
            const data = { projektName: document.getElementById('projektName').value, buildingAreas: buildingAreas };
            localStorage.setItem('protocolApp_data_blackred', JSON.stringify(data));
        }

        function loadData() {
            const stored = localStorage.getItem('protocolApp_data_blackred'); 
            if(stored) {
                try {
                    const data = JSON.parse(stored);
                    document.getElementById('projektName').value = data.projektName || '';
                    buildingAreas = data.buildingAreas || [];
                    buildingAreas.forEach(area => {
                        if (area.photos) area.photos = area.photos.map(p => typeof p === 'string' ? { data: p, note: "" } : p);
                        else area.photos = [];
                    });
                    renderAreas();
                } catch(e) { console.error("Datenfehler beim Laden", e); }
            }
        }

        function resetApp() {
            if(confirm("Möchten Sie wirklich alle Daten und Bilder löschen? Dieser Vorgang kann nicht rückgängig gemacht werden.")) {
                localStorage.clear();
                location.reload();
            }
        }

        // --- AREA INTERACTIONS ---
        function initSanitarGrid() {
            const grid = document.getElementById('sanitarGrid');
            grid.innerHTML = '';
            defaultSanitaryObjects.forEach(obj => {
                const btn = document.createElement('div');
                btn.className = 'item-btn'; btn.textContent = obj;
                btn.onclick = () => addSanitaryObject(obj);
                grid.appendChild(btn);
            });
            const customBtn = document.createElement('div');
            customBtn.className = 'item-btn'; customBtn.style.borderStyle = "dashed"; customBtn.style.color = "var(--accent-primary)";
            customBtn.innerHTML = `<i class="fas fa-plus"></i> Eigene...`;
            customBtn.onclick = createCustomObject;
            grid.appendChild(customBtn);
        }

        function createCustomObject() {
            const name = prompt("Bezeichnung der neuen Komponente:");
            if (name && name.trim() !== "") addSanitaryObject(name.trim());
        }

        function createNewArea() {
            const newId = Date.now().toString();
            buildingAreas.push({ id: newId, name: "Neuer Bereich", notes: "", items: [], photos: [] });
            saveData(); renderAreas(); openModal(newId);
        }

        function renderAreas() {
            const container = document.getElementById('kachelContainer');
            container.innerHTML = '';
            buildingAreas.forEach(area => {
                let total = area.items.length;
                let text = total === 0 ? 'Keine Komponenten' : `<strong>${total}</strong> Komponenten`;
                let photoPreview = (area.photos && area.photos.length > 0) ? ` • <i class="fas fa-image" style="color:var(--text-dim); margin-left: 5px;"></i> ${area.photos.length}` : '';
                let notesPreview = area.notes ? `<div style="color: var(--text-dim); font-size: 0.85em; margin-top: 10px; border-top: 1px solid var(--border-light); padding-top: 10px;"><i class="fas fa-info-circle" style="margin-right:5px; opacity:0.7;"></i> ${area.notes.substring(0, 45)}${area.notes.length > 45 ? '...' : ''}</div>` : '';

                const kachel = document.createElement('div');
                kachel.className = 'area-card'; kachel.onclick = () => openModal(area.id);
                kachel.innerHTML = `
                    <div class="area-info" style="flex-grow: 1; padding-right: 15px;">
                        <h3>${area.name}</h3>
                        <p>${text}${photoPreview}</p>
                        ${notesPreview}
                    </div>
                    <div class="area-arrow"><i class="fas fa-chevron-right"></i></div>
                `;
                container.appendChild(kachel);
            });
        }

        function openModal(areaId) {
            currentEditingId = areaId;
            const area = buildingAreas.find(a => a.id === areaId);
            document.getElementById('modalAreaName').value = area.name === "Neuer Bereich" ? "" : area.name;
            document.getElementById('modalAreaNotes').value = area.notes;
            if (!area.photos) area.photos = [];
            renderPhotos(); renderAddedItemsList();
            document.getElementById('areaModal').classList.add('active');
        }

        function closeModal() {
            const nameInput = document.getElementById('modalAreaName').value.trim();
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && nameInput === "") area.name = "Ohne Name";
            saveData();
            document.getElementById('areaModal').classList.remove('active');
            renderAreas();
        }

        function updateCurrentAreaName(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.name = val || "Neuer Bereich"; saveData(); }
        }

        function updateCurrentAreaNotes(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.notes = val; saveData(); }
        }

        function deleteCurrentArea() {
            if (confirm('Diesen Bereich und alle Inhalte löschen?')) {
                buildingAreas = buildingAreas.filter(a => a.id !== currentEditingId);
                saveData(); document.getElementById('areaModal').classList.remove('active'); renderAreas();
            }
        }

        // --- ASYNC PHOTO BUFFER ENGINE ---
        function handlePhotoUpload(input) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (!input.files || input.files.length === 0) return;
            const files = Array.from(input.files); let processedCount = 0;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800; let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        area.photos.push({ data: canvas.toDataURL('image/jpeg', 0.7), note: "" });
                        processedCount++;
                        if (processedCount === files.length) { saveData(); renderPhotos(); }
                    }
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            input.value = ""; 
        }

        function updatePhotoNote(index, val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos[index]) { area.photos[index].note = val; saveData(); }
        }

        function renderPhotos() {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const grid = document.getElementById('photoGrid'); grid.innerHTML = '';
            if (area && area.photos) {
                area.photos.forEach((photo, index) => {
                    const item = document.createElement('div'); item.className = 'photo-item';
                    item.innerHTML = `
                        <button class="photo-delete" onclick="deletePhoto(${index})"><i class="fas fa-times"></i></button>
                        <img src="${photo.data}" alt="Doku">
                        <input type="text" class="photo-note" placeholder="Notiz..." value="${photo.note || ''}">
                    `;
                    item.querySelector('input').oninput = (e) => updatePhotoNote(index, e.target.value);
                    grid.appendChild(item);
                });
            }
        }

        function deletePhoto(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos) { area.photos.splice(index, 1); saveData(); renderPhotos(); }
        }

        // --- MECHANICAL ENTRIES LOGIC ---
        function addSanitaryObject(objName) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const newItem = { id: Date.now().toString(), name: objName, kw: false, ww: false };
            if (objName === "Waschrinne") { newItem.zapfstellen = 2; newItem.kwCount = 2; newItem.wwCount = 2; }
            area.items.push(newItem); saveData(); renderAddedItemsList();
        }

        function removeSanitaryObject(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            area.items.splice(index, 1); saveData(); renderAddedItemsList();
        }

        function toggleWater(index, type) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) { area.items[index][type] = !area.items[index][type]; saveData(); renderAddedItemsList(); }
        }

        function updateZapfstellen(index, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) { let val = parseInt(value); area.items[index].zapfstellen = isNaN(val) || val < 1 ? 1 : val; saveData(); }
        }

        function updateWaschrinneWater(index, type, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) { let val = parseInt(value); let safeVal = isNaN(val) || val < 0 ? 0 : val;
                if (type === 'kw') area.items[index].kwCount = safeVal; if (type === 'ww') area.items[index].wwCount = safeVal; saveData(); }
        }

        function renderAddedItemsList() {
            const list = document.getElementById('addedItemsList'); list.innerHTML = '';
            const area = buildingAreas.find(a => a.id === currentEditingId);
            
            if (area.items.length === 0) {
                list.innerHTML = '<li class="added-item" style="color:var(--text-dim); justify-content:center; border-style: dashed; box-shadow: none;">Noch keine Komponenten erfasst</li>'; return;
            }

            area.items.forEach((item, index) => {
                const li = document.createElement('li'); li.className = 'added-item';
                let controlsHTML = '';
                if (item.name === "Waschrinne") {
                    controlsHTML = `
                        <div class="number-input"><span>Z</span><input type="number" min="1" value="${item.zapfstellen || 2}" onchange="updateZapfstellen(${index}, this.value)"></div>
                        <div class="number-input" style="background: rgba(59, 130, 246, 0.1); border-color: #3b82f6;"><span>KW</span><input type="number" min="0" value="${item.kwCount !== undefined ? item.kwCount : 2}" onchange="updateWaschrinneWater(${index}, 'kw', this.value)" style="color:#60a5fa;"></div>
                        <div class="number-input" style="background: rgba(255, 0, 0, 0.1); border-color: #ff0000;"><span>WW</span><input type="number" min="0" value="${item.wwCount !== undefined ? item.wwCount : 2}" onchange="updateWaschrinneWater(${index}, 'ww', this.value)" style="color:#ff0000;"></div>
                    `;
                } else {
                    controlsHTML = `
                        <button class="toggle-btn kw ${item.kw ? 'active' : ''}" onclick="toggleWater(${index}, 'kw')">KW</button>
                        <button class="toggle-btn ww ${item.ww ? 'active' : ''}" onclick="toggleWater(${index}, 'ww')">WW</button>
                    `;
                }
                li.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-controls">${controlsHTML} <button class="trash-btn" onclick="removeSanitaryObject(${index})"><i class="fas fa-trash"></i></button></div>
                `;
                list.appendChild(li);
            });
        }

        // --- TECHNICAL PRINT ENGINE (HELL & DRUCKFREUNDLICH) ---
        function exportToPDF(summaryOnly) {
            const overlay = document.getElementById('pdf-loading-overlay');
            window.scrollTo(0, 0); 
            overlay.classList.add('active');

            const projektName = document.getElementById('projektName').value.trim() || 'Unbenanntes Projekt';
            const datum = document.getElementById('currentDate').textContent;

            let totalObjects = 0; let totalKW = 0; let totalWW = 0;
            buildingAreas.forEach(area => {
                totalObjects += area.items.length;
                area.items.forEach(item => {
                    if (item.name === "Waschrinne") {
                        totalKW += (item.kwCount !== undefined ? item.kwCount : 2);
                        totalWW += (item.wwCount !== undefined ? item.wwCount : 2);
                    } else {
                        if (item.kw) totalKW++; if (item.ww) totalWW++;
                    }
                });
            });

            // Das PDF bleibt hell für den Druck, verwendet aber rote Akzente anstelle der vorherigen blauen.
            let htmlString = `
            <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #ffffff; color: #111111; box-sizing: border-box; padding: 15px;">
                
                <div style="border-bottom: 2px solid #e0e0e0; padding-bottom: 20px; margin-bottom: 40px;">
                    <div style="font-size: 13px; font-weight: 600; color: #888888; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px;">
                        ${summaryOnly ? 'Mengenermittlung / Übersicht' : 'Erfassungsprotokoll'}
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr>
                            <td style="vertical-align: bottom;">
                                <h1 style="margin: 0; font-size: 32px; font-weight: 800; color: #000000; letter-spacing: -0.5px;">${projektName}</h1>
                            </td>
                            <td style="text-align: right; vertical-align: bottom; font-size: 15px; color: #555555;">
                                Datum: <strong style="color: #000000;">${datum}</strong>
                            </td>
                        </tr>
                    </table>
                </div>
            `;

            if (buildingAreas.length === 0) {
                htmlString += `<div style="text-align: center; padding: 60px; font-size: 16px; color: #999999;">Keine Bereiche erfasst.</div>`;
            } else {
                buildingAreas.forEach((area, index) => {
                    if (index > 0) { htmlString += `<div style="page-break-before: always; height: 1px;"></div>`; }

                    htmlString += `
                        <div style="margin-bottom: 40px;">
                            <h2 style="font-size: 20px; font-weight: 700; margin: 0 0 20px 0; background: #f9f9f9; border-left: 4px solid #ff0000; padding: 12px 16px; color: #000000; border-radius: 4px;">
                                ${area.name}
                            </h2>
                    `;

                    if (area.items.length > 0) {
                        htmlString += `
                            <table style="width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 25px;">
                                <thead>
                                    <tr style="border-bottom: 2px solid #cccccc;">
                                        <th style="padding: 12px 10px; text-align: left; width: 65%; color: #555555; font-weight: 700;">Komponente</th>
                                        <th style="padding: 12px 10px; text-align: right; width: 35%; color: #555555; font-weight: 700;">Anschlussart</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        area.items.forEach((item, idx) => {
                            const rowBg = idx % 2 === 0 ? '#ffffff' : '#fcfcfc';
                            let detailInfo = ''; let waterBadgesHTML = '';

                            if (item.name === "Waschrinne") {
                                detailInfo = ` <span style="color: #888888; font-size: 13px;">(${item.zapfstellen || 2} Zapfstellen)</span>`;
                                let kwMenge = item.kwCount !== undefined ? item.kwCount : 2; let wwMenge = item.wwCount !== undefined ? item.wwCount : 2;
                                let badges = [];
                                if (kwMenge > 0) badges.push(`<strong style="color:#3b82f6;">${kwMenge}x KW</strong>`);
                                if (wwMenge > 0) badges.push(`<strong style="color:#ff0000;">${wwMenge}x WW</strong>`);
                                waterBadgesHTML = badges.length > 0 ? badges.join(' <span style="color:#cccccc;">|</span> ') : `-`;
                            } else {
                                let badges = [];
                                if (item.kw) badges.push(`<strong style="color:#3b82f6;">KW</strong>`);
                                if (item.ww) badges.push(`<strong style="color:#ff0000;">WW</strong>`);
                                waterBadgesHTML = badges.length > 0 ? badges.join(' <span style="color:#cccccc;">|</span> ') : `-`;
                            }

                            htmlString += `
                                <tr style="background-color: ${rowBg}; border-bottom: 1px solid #eeeeee;">
                                    <td style="padding: 12px 10px; font-weight: 600; color: #111111;">${item.name}${detailInfo}</td>
                                    <td style="padding: 12px 10px; text-align: right;">${waterBadgesHTML}</td>
                                </tr>
                            `;
                        });
                        htmlString += `</tbody></table>`;
                    } else {
                        htmlString += `<div style="font-size: 14px; color: #999999; margin-bottom: 20px; padding-left: 10px;">Keine Komponenten erfasst.</div>`;
                    }

                    if (!summaryOnly && area.notes && area.notes.trim() !== '') {
                        htmlString += `
                            <div style="margin-bottom: 25px; padding: 16px; background: #fff5f5; border-left: 4px solid #ff0000; border-radius: 4px;">
                                <strong style="font-size: 13px; color: #cc0000; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px;">Mängel / Bemerkungen:</strong>
                                <div style="font-size: 14px; line-height: 1.6; color: #330000;">${area.notes.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    }

                    if (!summaryOnly && area.photos && area.photos.length > 0) {
                        htmlString += `
                            <div style="font-size: 14px; font-weight: 700; color: #555555; text-transform: uppercase; letter-spacing: 1px; margin-top: 35px; margin-bottom: 15px; border-bottom: 1px solid #eeeeee; padding-bottom: 8px;">
                                Fotodokumentation
                            </div>
                        `;
                        
                        htmlString += `<table style="width:100%; border-collapse:collapse; margin-bottom:30px;">`;
                        for (let i = 0; i < area.photos.length; i += 2) {
                            let photo1 = area.photos[i]; let photo2 = area.photos[i+1];
                            htmlString += `<tr class="keep-together" style="page-break-inside:avoid;">`;
                            htmlString += `
                                <td style="width:48%; padding-bottom:20px; vertical-align:top;">
                                    <div style="border: 1px solid #eeeeee; border-radius: 8px; overflow: hidden; padding: 4px; background: #fafafa;">
                                        <img src="${photo1.data}" style="width: 100%; height: auto; max-height:280px; object-fit: contain; display: block; border-radius: 4px;">
                                        ${photo1.note ? `<div style="padding: 10px 5px; text-align: center; font-size: 13px; color: #111111; font-weight: 600;">${photo1.note}</div>` : ''}
                                    </div>
                                </td>
                            `;
                            htmlString += `<td style="width:4%;"></td>`;
                            if (photo2) {
                                htmlString += `
                                    <td style="width:48%; padding-bottom:20px; vertical-align:top;">
                                        <div style="border: 1px solid #eeeeee; border-radius: 8px; overflow: hidden; padding: 4px; background: #fafafa;">
                                            <img src="${photo2.data}" style="width: 100%; height: auto; max-height:280px; object-fit: contain; display: block; border-radius: 4px;">
                                            ${photo2.note ? `<div style="padding: 10px 5px; text-align: center; font-size: 13px; color: #111111; font-weight: 600;">${photo2.note}</div>` : ''}
                                        </div>
                                    </td>
                                `;
                            } else {
                                htmlString += `<td style="width:48%;"></td>`;
                            }
                            htmlString += `</tr>`;
                        }
                        htmlString += `</table>`;
                    }
                    htmlString += `</div>`;
                });
                
                htmlString += `
                    <div style="page-break-before: always; height: 1px;"></div>
                    <div style="background: #fafafa; border: 1px solid #eeeeee; border-radius: 8px; padding: 20px 25px; margin-bottom: 25px;">
                        <h2 style="font-size: 20px; font-weight: 700; margin: 0; color: #000000;">
                            Gesamtauswertung
                        </h2>
                    </div>
                    
                    <table style="width: 100%; border-collapse: collapse; font-size: 15px;">
                        <tr style="border-bottom: 1px solid #eeeeee;">
                            <td style="padding: 16px 10px; font-weight: 600; width: 70%; color: #111111;">Erfasste Komponenten Gesamt</td>
                            <td style="padding: 16px 10px; text-align: right; font-weight: 800; font-size: 20px; color: #000000;">${totalObjects}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid #eeeeee;">
                            <td style="padding: 16px 10px; font-weight: 600; color: #555555;">Kaltwasser-Anschlüsse (KW)</td>
                            <td style="padding: 16px 10px; text-align: right; font-weight: 800; font-size: 20px; color: #3b82f6;">${totalKW}x</td>
                        </tr>
                        <tr>
                            <td style="padding: 16px 10px; font-weight: 600; color: #555555;">Warmwasser-Anschlüsse (WW)</td>
                            <td style="padding: 16px 10px; text-align: right; font-weight: 800; font-size: 20px; color: #ff0000;">${totalWW}x</td>
                        </tr>
                    </table>
                `;
            }
            htmlString += `</div>`; 

            const workerContainer = document.createElement('div');
            workerContainer.innerHTML = htmlString;

            setTimeout(() => {
                const opt = {
                    margin:       [15, 15, 15, 15], 
                    filename:     `${projektName.replace(/[^a-zA-Z0-9]/g, '_') || 'Protokoll'}${summaryOnly ? '_Uebersicht' : ''}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    pagebreak:    { mode: ['css', 'legacy'], avoid: '.keep-together' }, 
                    html2canvas:  { scale: 2, useCORS: true, logging: false },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                html2pdf().set(opt).from(workerContainer).toPdf().get('pdf').then(function (pdf) {
                    const totalPages = pdf.internal.getNumberOfPages();
                    for (let i = 1; i <= totalPages; i++) {
                        pdf.setPage(i);
                        pdf.setFontSize(9);
                        pdf.setTextColor(136, 136, 136);
                        pdf.text('Seite ' + i + ' von ' + totalPages, pdf.internal.pageSize.getWidth() - 15, pdf.internal.pageSize.getHeight() - 8, {align: 'right'});
                    }
                }).save().then(() => {
                    overlay.classList.remove('active');
                }).catch(err => {
                    console.error("Engine Error: ", err);
                    overlay.classList.remove('active');
                    alert("Es gab ein Problem beim Erstellen des PDFs.");
                });
            }, 600); 
        }

        // --- APPINIT ---
        window.onload = () => { loadData(); initSanitarGrid(); };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Error:', err));
            });
        }
    </script>
</body>
</html>
