<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProtocolApp Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProtocolApp">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-base: #000000;
            --bg-panel: #0a0a0a;
            --bg-input: #141414;
            --accent-primary: #ff003c;
            --accent-primary-hover: #d40032;
            --accent-secondary: #00f0ff;
            --text-bright: #ffffff;
            --text-dim: #888888;
            --border-hard: #2a2a2a;
            --radius-sharp: 6px;
            --transition-fast: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-bright);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0; 
            letter-spacing: -0.015em;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Overlay mit feinem Pulse-Effekt */
        #pdf-loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(10px); z-index: 999999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #pdf-loading-overlay.active { opacity: 1; pointer-events: auto; }
        #pdf-loading-overlay i { font-size: 3.5em; color: var(--accent-secondary); margin-bottom: 25px; text-shadow: 0 0 20px rgba(0, 240, 255, 0.4); }
        #pdf-loading-overlay h3 { color: var(--text-bright); margin: 0 0 10px 0; font-size: 1.3em; text-transform: uppercase; letter-spacing: 2px; }
        #pdf-loading-overlay p { color: var(--text-dim); text-align: center; max-width: 80%; font-size: 0.9em; line-height: 1.6; }

        .app-container { width: 100%; max-width: 600px; margin: 0 auto; padding: 25px 20px 100px 20px; }

        .brand-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border-hard);
            padding-bottom: 15px; margin-bottom: 30px;
        }
        .brand-logo { font-size: 1.5em; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        .brand-logo span { color: var(--accent-primary); text-shadow: 0 0 15px rgba(255, 0, 60, 0.3); }
        .date-badge { background: var(--bg-input); border: 1px solid var(--border-hard); padding: 8px 14px; border-radius: var(--radius-sharp); font-size: 0.85em; font-weight: 600; color: var(--text-dim); }

        .project-panel {
            background: var(--bg-panel); border: 1px solid var(--border-hard);
            border-radius: var(--radius-sharp); padding: 25px; margin-bottom: 35px;
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.02), 0 8px 24px rgba(0,0,0,0.4);
        }
        .input-block { margin-bottom: 20px; }
        .input-block:last-child { margin-bottom: 0; }
        .input-block label { display: block; font-size: 0.75em; font-weight: 800; color: var(--accent-secondary); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .input-block input, .input-block textarea {
            width: 100%; background: var(--bg-input); border: 1px solid var(--border-hard);
            color: var(--text-bright); padding: 16px; border-radius: var(--radius-sharp);
            font-family: inherit; font-size: 16px; font-weight: 600; outline: none;
            transition: var(--transition-fast);
        }
        .input-block input:focus, .input-block textarea:focus { border-color: var(--accent-secondary); box-shadow: 0 0 0 2px rgba(0, 240, 255, 0.1); }
        .input-block textarea { resize: vertical; min-height: 90px; }

        .section-title { font-size: 0.85em; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 35px 0 20px 0; border-bottom: 1px solid var(--border-hard); padding-bottom: 10px; }

        #kachelContainer { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .area-card {
            background: var(--bg-panel); border: 1px solid var(--border-hard);
            border-radius: var(--radius-sharp); padding: 22px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: var(--transition-fast);
            position: relative; overflow: hidden;
        }
        .area-card::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px;
            background: var(--accent-secondary); opacity: 0; transition: var(--transition-fast);
        }
        .area-card:hover::before { opacity: 1; }
        .area-card:active { transform: scale(0.98); border-color: var(--accent-secondary); }
        .area-info h3 { margin: 0 0 8px 0; font-size: 1.15em; font-weight: 800; }
        .area-info p { margin: 0; font-size: 0.85em; color: var(--text-dim); line-height: 1.5; }
        .area-arrow { color: var(--accent-primary); font-size: 1.2em; opacity: 0.7; }

        .btn-primary, .btn-outline, .btn-danger, .btn-secondary {
            width: 100%; padding: 18px; font-size: 1em; font-weight: 800; text-transform: uppercase;
            border-radius: var(--radius-sharp); cursor: pointer; text-align: center;
            display: flex; justify-content: center; align-items: center; gap: 12px;
            transition: var(--transition-fast); letter-spacing: 1px; margin-bottom: 15px;
        }
        .btn-primary { background: var(--accent-primary); color: #fff; border: none; box-shadow: 0 4px 15px rgba(255, 0, 60, 0.2); }
        .btn-primary:active { background: var(--accent-primary-hover); transform: translateY(2px); box-shadow: none; }
        
        .btn-secondary { background: var(--bg-panel); color: var(--text-bright); border: 1px solid var(--border-hard); }
        .btn-secondary:active { border-color: var(--accent-secondary); color: var(--accent-secondary); transform: translateY(2px); }
        
        .btn-outline { background: transparent; color: var(--text-bright); border: 2px dashed var(--border-hard); }
        .btn-outline:active { border-color: var(--accent-secondary); color: var(--accent-secondary); background: rgba(0, 240, 255, 0.05); }
        
        .btn-danger { background: transparent; color: #ff4a4a; border: 1px solid rgba(255, 74, 74, 0.3); margin-top: 40px; font-size: 0.85em; }
        .btn-danger:active { background: rgba(255, 74, 74, 0.1); border-color: #ff4a4a; }

        /* Modernes Modal (Slide-Up) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-base); border-top: 3px solid var(--accent-secondary); width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 30px 20px 50px 20px; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); border-radius: 16px 16px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .modal-header h2 { margin: 0; font-size: 1.3em; font-weight: 800; text-transform: uppercase; color: var(--text-bright); }
        .close-btn { background: var(--bg-input); border: 1px solid var(--border-hard); color: var(--text-dim); width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2em; cursor: pointer; transition: var(--transition-fast); }
        .close-btn:active { color: var(--accent-primary); border-color: var(--accent-primary); transform: rotate(90deg); }

        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .photo-item { border: 1px solid var(--border-hard); background: var(--bg-input); border-radius: var(--radius-sharp); overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .photo-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .photo-note { background: transparent; border: none; border-top: 1px solid var(--border-hard); color: var(--accent-secondary); padding: 12px; font-size: 0.85em; font-weight: 600; outline: none; width: 100%; text-align: center; }
        .photo-note::placeholder { color: var(--text-dim); font-weight: 400; }
        .photo-delete { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); color: var(--accent-primary); border: 1px solid var(--accent-primary); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-fast); }
        .photo-delete:active { background: var(--accent-primary); color: #fff; transform: scale(0.9); }

        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        .item-btn { background: var(--bg-input); border: 1px solid var(--border-hard); padding: 15px 10px; color: var(--text-bright); font-size: 0.85em; font-weight: 600; text-align: center; border-radius: var(--radius-sharp); cursor: pointer; transition: var(--transition-fast); }
        .item-btn:active { border-color: var(--accent-secondary); background: rgba(0, 240, 255, 0.05); transform: scale(0.98); }

        .added-list { list-style: none; padding: 0; margin: 0 0 30px 0; display: flex; flex-direction: column; gap: 12px; }
        .added-item { background: var(--bg-panel); border: 1px solid var(--border-hard); border-left: 3px solid var(--border-hard); border-radius: var(--radius-sharp); padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; transition: var(--transition-fast); }
        .added-item:hover { border-left-color: var(--accent-secondary); }
        .item-name { font-weight: 800; font-size: 0.95em; color: var(--text-bright); flex-grow: 1; min-width: 120px; text-transform: uppercase; letter-spacing: 0.5px; }
        .item-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
        
        .toggle-btn { background: var(--bg-input); border: 1px solid var(--border-hard); color: var(--text-dim); padding: 8px 14px; font-size: 0.75em; font-weight: 800; border-radius: var(--radius-sharp); cursor: pointer; transition: var(--transition-fast); }
        .toggle-btn.active.kw { border-color: var(--accent-secondary); color: var(--accent-secondary); background: rgba(0, 240, 255, 0.1); box-shadow: inset 0 0 10px rgba(0, 240, 255, 0.1); }
        .toggle-btn.active.ww { border-color: var(--accent-primary); color: var(--accent-primary); background: rgba(255, 0, 60, 0.1); box-shadow: inset 0 0 10px rgba(255, 0, 60, 0.1); }

        .number-input { display: flex; align-items: center; gap: 6px; background: var(--bg-input); border: 1px solid var(--border-hard); padding: 6px 10px; border-radius: var(--radius-sharp); }
        .number-input span { font-size: 0.75em; font-weight: 800; color: var(--text-dim); }
        .number-input input { background: transparent; border: none; color: var(--text-bright); width: 35px; text-align: center; font-size: 1em; font-weight: 800; outline: none; padding: 0; }
        
        .trash-btn { color: var(--text-dim); background: transparent; border: none; font-size: 1.2em; cursor: pointer; padding: 5px; margin-left: 8px; transition: var(--transition-fast); }
        .trash-btn:active { color: var(--accent-primary); transform: scale(0.8); }
    </style>
</head>
<body>

    <div id="pdf-loading-overlay">
        <i class="fas fa-cog fa-spin"></i>
        <h3>Generiere PDF</h3>
        <p>A4 Layout wird berechnet. Bilder werden in bester Qualität arrangiert...</p>
    </div>

    <div class="app-container" id="main-app">
        <header class="brand-header">
            <div class="brand-logo">Protocol<span>App</span></div>
            <div class="date-badge" id="currentDate">--.--.----</div>
        </header>

        <div class="project-panel">
            <div class="input-block">
                <label>Projektname / Bauvorhaben</label>
                <input type="text" id="projektName" placeholder="Z.B. BVH Mustermann..." oninput="saveData()">
            </div>
        </div>

        <div class="section-title">Erfasste Bereiche</div>
        <div id="kachelContainer"></div>

        <button class="btn-outline" onclick="createNewArea()">
            <i class="fas fa-plus"></i> Neuen Bereich hinzufügen
        </button>

        <div class="section-title">PDF Export</div>
        
        <button class="btn-primary" onclick="exportToPDF(false)">
            <i class="fas fa-file-pdf"></i> Komplettes Protokoll
        </button>
        
        <button class="btn-secondary" onclick="exportToPDF(true)">
            <i class="fas fa-list"></i> Nur Stückliste (Übersicht)
        </button>
        
        <button class="btn-danger" onclick="resetApp()">
            <i class="fas fa-skull"></i> App Zurücksetzen
        </button>
    </div>

    <div class="modal-overlay" id="areaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bereich bearbeiten</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>

            <div class="input-block">
                <label>Name des Bereichs (z.B. Bad 1. OG)</label>
                <input type="text" id="modalAreaName" oninput="updateCurrentAreaName(this.value)">
            </div>

            <div class="input-block">
                <label>Mängel / Bemerkungen</label>
                <textarea id="modalAreaNotes" placeholder="Zustand festhalten..." oninput="updateCurrentAreaNotes(this.value)"></textarea>
            </div>

            <div class="section-title">Fotodokumentation</div>
            <button class="btn-outline" style="border-style: solid; background: var(--bg-panel);" onclick="document.getElementById('cameraInput').click()">
                <i class="fas fa-camera"></i> Foto aufnehmen / Galerie
            </button>
            <input type="file" id="cameraInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)" multiple>
            <div class="photo-grid" id="photoGrid"></div>

            <div class="section-title">Entnahmestellen</div>
            <div class="item-grid" id="sanitarGrid"></div>

            <div class="section-title">Erfasste Objekte</div>
            <ul class="added-list" id="addedItemsList"></ul>

            <button class="btn-primary" onclick="closeModal()">Sichern & Schließen</button>
            <button class="btn-danger" style="margin-top: 20px; border: none;" onclick="deleteCurrentArea()">Diesen Bereich löschen</button>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

        let buildingAreas = [];
        let currentEditingId = null;

        const defaultSanitaryObjects = [
            "Waschbecken", "Spülbecken", "Ausgussbecken", "WC", 
            "Dusche", "Gerätezapfstelle", "Zapfstelle", "Außenzapfstelle"
        ];

        function saveData() {
            const data = { projektName: document.getElementById('projektName').value, buildingAreas: buildingAreas };
            localStorage.setItem('protocolApp_data_v4', JSON.stringify(data));
        }

        function loadData() {
            const stored = localStorage.getItem('protocolApp_data_v4') || localStorage.getItem('protocolAppFinalDataV4') || localStorage.getItem('protocolAppNeoData3'); 
            if(stored) {
                try {
                    const data = JSON.parse(stored);
                    document.getElementById('projektName').value = data.projektName || '';
                    buildingAreas = data.buildingAreas || [];
                    buildingAreas.forEach(area => {
                        if (area.photos) area.photos = area.photos.map(p => typeof p === 'string' ? { data: p, note: "" } : p);
                        else area.photos = [];
                    });
                    renderAreas();
                } catch(e) { console.error("Datenfehler", e); }
            }
        }

        function resetApp() {
            if(confirm("KRITISCHER VORGANG: Alle Daten und Bilder werden permanent gelöscht. Fortfahren?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function initSanitarGrid() {
            const grid = document.getElementById('sanitarGrid');
            grid.innerHTML = '';
            defaultSanitaryObjects.forEach(obj => {
                const btn = document.createElement('div');
                btn.className = 'item-btn'; btn.textContent = obj;
                btn.onclick = () => addSanitaryObject(obj);
                grid.appendChild(btn);
            });
            const customBtn = document.createElement('div');
            customBtn.className = 'item-btn'; customBtn.style.borderStyle = "dashed"; customBtn.style.color = "var(--accent-secondary)";
            customBtn.innerHTML = `<i class="fas fa-plus"></i> Eigene...`;
            customBtn.onclick = createCustomObject;
            grid.appendChild(customBtn);
        }

        function createCustomObject() {
            const name = prompt("Name der Entnahmestelle:");
            if (name && name.trim() !== "") addSanitaryObject(name.trim());
        }

        function createNewArea() {
            const newId = Date.now().toString();
            buildingAreas.push({ id: newId, name: "Unbenannter Bereich", notes: "", items: [], photos: [] });
            saveData(); renderAreas(); openModal(newId);
        }

        function renderAreas() {
            const container = document.getElementById('kachelContainer');
            container.innerHTML = '';
            buildingAreas.forEach(area => {
                let total = area.items.length;
                let text = total === 0 ? 'Keine Objekte' : `<strong>${total}</strong> Objekt(e)`;
                let photoPreview = (area.photos && area.photos.length > 0) ? ` • <span style="color:var(--accent-secondary);"><strong>${area.photos.length}</strong> Foto(s)</span>` : '';
                let notesPreview = area.notes ? `<div style="color: var(--text-dim); font-size: 0.8em; margin-top: 10px; border-top: 1px dashed var(--border-hard); padding-top: 8px;"><i class="fas fa-comment-dots" style="margin-right:5px; opacity:0.5;"></i> ${area.notes.substring(0, 45)}${area.notes.length > 45 ? '...' : ''}</div>` : '';

                const kachel = document.createElement('div');
                kachel.className = 'area-card'; kachel.onclick = () => openModal(area.id);
                kachel.innerHTML = `
                    <div class="area-info" style="flex-grow: 1; padding-right: 15px;">
                        <h3>${area.name}</h3>
                        <p>${text}${photoPreview}</p>
                        ${notesPreview}
                    </div>
                    <div class="area-arrow"><i class="fas fa-chevron-right"></i></div>
                `;
                container.appendChild(kachel);
            });
        }

        function openModal(areaId) {
            currentEditingId = areaId;
            const area = buildingAreas.find(a => a.id === areaId);
            document.getElementById('modalAreaName').value = area.name === "Unbenannter Bereich" ? "" : area.name;
            document.getElementById('modalAreaNotes').value = area.notes;
            if (!area.photos) area.photos = [];
            renderPhotos(); renderAddedItemsList();
            document.getElementById('areaModal').classList.add('active');
        }

        function closeModal() {
            const nameInput = document.getElementById('modalAreaName').value.trim();
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && nameInput === "") area.name = "Bereich (Ohne Name)";
            saveData();
            document.getElementById('areaModal').classList.remove('active');
            renderAreas();
        }

        function updateCurrentAreaName(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.name = val || "Unbenannter Bereich"; saveData(); }
        }

        function updateCurrentAreaNotes(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.notes = val; saveData(); }
        }

        function handlePhotoUpload(input) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (!input.files || input.files.length === 0) return;
            const files = Array.from(input.files); let processedCount = 0;

            files.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 800; let width = img.width; let height = img.height;
                        if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } 
                        else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        area.photos.push({ data: canvas.toDataURL('image/jpeg', 0.7), note: "" });
                        processedCount++;
                        if (processedCount === files.length) { saveData(); renderPhotos(); }
                    }
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            input.value = ""; 
        }

        function updatePhotoNote(index, val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos[index]) { area.photos[index].note = val; saveData(); }
        }

        function renderPhotos() {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const grid = document.getElementById('photoGrid'); grid.innerHTML = '';
            if (area && area.photos) {
                area.photos.forEach((photo, index) => {
                    const item = document.createElement('div'); item.className = 'photo-item';
                    item.innerHTML = `
                        <button class="photo-delete" onclick="deletePhoto(${index})"><i class="fas fa-trash"></i></button>
                        <img src="${photo.data}" alt="Doku">
                        <input type="text" class="photo-note" placeholder="Notiz hinzufügen..." value="${photo.note || ''}">
                    `;
                    item.querySelector('input').oninput = (e) => updatePhotoNote(index, e.target.value);
                    grid.appendChild(item);
                });
            }
        }

        function deletePhoto(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos) { area.photos.splice(index, 1); saveData(); renderPhotos(); }
        }

        function addSanitaryObject(objName) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const newItem = { id: Date.now().toString(), name: objName, kw: false, ww: false };
            if (objName === "Waschrinne") { newItem.zapfstellen = 2; newItem.kwCount = 2; newItem.wwCount = 2; }
            area.items.push(newItem); saveData(); renderAddedItemsList();
        }

        function removeSanitaryObject(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            area.items.splice(index, 1); saveData(); renderAddedItemsList();
        }

        function toggleWater(index, type) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) { area.items[index][type] = !area.items[index][type]; saveData(); renderAddedItemsList(); }
        }

        function updateZapfstellen(index, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) { let val = parseInt(value); area.items[index].zapfstellen = isNaN(val) || val < 1 ? 1 : val; saveData(); }
        }

        function updateWaschrinneWater(index, type, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) { let val = parseInt(value); let safeVal = isNaN(val) || val < 0 ? 0 : val;
                if (type === 'kw') area.items[index].kwCount = safeVal; if (type === 'ww') area.items[index].wwCount = safeVal; saveData(); }
        }

        function deleteCurrentArea() {
            if (confirm('Bereich wirklich löschen?')) {
                buildingAreas = buildingAreas.filter(a => a.id !== currentEditingId);
                saveData(); document.getElementById('areaModal').classList.remove('active'); renderAreas();
            }
        }

        function renderAddedItemsList() {
            const list = document.getElementById('addedItemsList'); list.innerHTML = '';
            const area = buildingAreas.find(a => a.id === currentEditingId);
            
            if (area.items.length === 0) {
                list.innerHTML = '<li class="added-item" style="color:var(--text-dim); justify-content:center; border-style: dashed; font-weight: normal; font-size: 0.9em;">Noch keine Objekte erfasst</li>'; return;
            }

            area.items.forEach((item, index) => {
                const li = document.createElement('li'); li.className = 'added-item';
                let controlsHTML = '';
                if (item.name === "Waschrinne") {
                    controlsHTML = `
                        <div class="number-input"><span>Z</span><input type="number" min="1" value="${item.zapfstellen || 2}" onchange="updateZapfstellen(${index}, this.value)"></div>
                        <div class="number-input" style="border-color: var(--accent-secondary);"><span>KW</span><input type="number" min="0" value="${item.kwCount !== undefined ? item.kwCount : 2}" onchange="updateWaschrinneWater(${index}, 'kw', this.value)"></div>
                        <div class="number-input" style="border-color: var(--accent-primary);"><span>WW</span><input type="number" min="0" value="${item.wwCount !== undefined ? item.wwCount : 2}" onchange="updateWaschrinneWater(${index}, 'ww', this.value)"></div>
                    `;
                } else {
                    controlsHTML = `
                        <button class="toggle-btn kw ${item.kw ? 'active' : ''}" onclick="toggleWater(${index}, 'kw')">KW</button>
                        <button class="toggle-btn ww ${item.ww ? 'active' : ''}" onclick="toggleWater(${index}, 'ww')">WW</button>
                    `;
                }
                li.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-controls">${controlsHTML} <button class="trash-btn" onclick="removeSanitaryObject(${index})"><i class="fas fa-times"></i></button></div>
                `;
                list.appendChild(li);
            });
        }

        // --- DER ABSOLUTE PDF-PROFI-EXPORT (Exaktes A4-Mapping, Kein Padding-Double, Flexbox-Safe) ---
        function exportToPDF(summaryOnly) {
            const overlay = document.getElementById('pdf-loading-overlay');
            window.scrollTo(0, 0); 
            overlay.classList.add('active');

            const projektName = document.getElementById('projektName').value.trim() || 'Unbenanntes Projekt';
            const datum = document.getElementById('currentDate').textContent;

            let totalObjects = 0; let totalKW = 0; let totalWW = 0;
            buildingAreas.forEach(area => {
                totalObjects += area.items.length;
                area.items.forEach(item => {
                    if (item.name === "Waschrinne") {
                        totalKW += (item.kwCount !== undefined ? item.kwCount : 2);
                        totalWW += (item.wwCount !== undefined ? item.wwCount : 2);
                    } else {
                        if (item.kw) totalKW++; if (item.ww) totalWW++;
                    }
                });
            });

            // WICHTIG: Kein HTML-Padding an den Rändern, das macht jsPDF über den "margin"-Parameter in echten Millimetern!
            // Breite fest auf 794px für ein absolut maßstabsgetreues 96dpi A4-Rendering ohne Skalierungsfehler.
            let htmlString = `
            <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #ffffff; color: #111; box-sizing: border-box; width: 794px; min-height: 1123px;">
                
                <div style="border-bottom: 3px solid #e0e0e0; padding-bottom: 15px; margin-bottom: 40px;">
                    <div style="font-size: 14px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">
                        ${summaryOnly ? 'Mengenermittlung / Übersicht' : 'Erfassungsprotokoll'}
                    </div>
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr>
                            <td style="vertical-align: bottom;">
                                <h1 style="margin: 0; font-size: 34px; font-weight: 800; text-transform: uppercase; color: #000; letter-spacing: -0.5px;">${projektName}</h1>
                            </td>
                            <td style="text-align: right; vertical-align: bottom; font-size: 15px; color: #555;">
                                Datum: <strong style="color: #000;">${datum}</strong>
                            </td>
                        </tr>
                    </table>
                </div>
            `;

            if (buildingAreas.length === 0) {
                htmlString += `<div style="text-align: center; padding: 60px; font-size: 16px; font-style: italic; color: #999;">Keine Bereiche erfasst.</div>`;
            } else {
                buildingAreas.forEach((area, index) => {
                    if (index > 0) {
                        htmlString += `<div style="page-break-before: always; height: 1px;"></div>`;
                    }

                    htmlString += `
                        <div style="margin-bottom: 40px;">
                            <h2 style="font-size: 22px; font-weight: 800; margin: 0 0 20px 0; text-transform: uppercase; background: #f4f4f4; border-left: 6px solid #e00034; padding: 12px 18px; color: #000; letter-spacing: 0.5px;">
                                ${area.name}
                            </h2>
                    `;

                    if (area.items.length > 0) {
                        htmlString += `
                            <table style="width: 100%; border-collapse: collapse; font-size: 15px; margin-bottom: 25px; border: 1px solid #ddd;">
                                <thead>
                                    <tr style="background-color: #f9f9f9; border-bottom: 2px solid #222;">
                                        <th style="padding: 12px 18px; text-align: left; width: 65%; text-transform: uppercase; font-size: 12px; font-weight: bold; color: #555; letter-spacing: 1px;">Entnahmestelle</th>
                                        <th style="padding: 12px 18px; text-align: right; width: 35%; text-transform: uppercase; font-size: 12px; font-weight: bold; color: #555; letter-spacing: 1px;">Anschlussart</th>
                                    </tr>
                                </thead>
                                <tbody>
                        `;

                        area.items.forEach((item, idx) => {
                            const rowBg = idx % 2 === 0 ? '#ffffff' : '#fafafa';
                            let detailInfo = ''; let waterBadgesHTML = '';

                            if (item.name === "Waschrinne") {
                                detailInfo = ` <span style="font-size: 13px; font-weight: normal; color:#777; margin-left: 5px;">(${item.zapfstellen || 2} Zapfstellen)</span>`;
                                let kwMenge = item.kwCount !== undefined ? item.kwCount : 2; let wwMenge = item.wwCount !== undefined ? item.wwCount : 2;
                                let badges = [];
                                if (kwMenge > 0) badges.push(`<strong style="color:#0075ff;">${kwMenge}x KW</strong>`);
                                if (wwMenge > 0) badges.push(`<strong style="color:#e00034;">${wwMenge}x WW</strong>`);
                                waterBadgesHTML = badges.length > 0 ? badges.join(' <span style="color:#ccc;">|</span> ') : `-`;
                            } else {
                                let badges = [];
                                if (item.kw) badges.push(`<strong style="color:#0075ff;">KW</strong>`);
                                if (item.ww) badges.push(`<strong style="color:#e00034;">WW</strong>`);
                                waterBadgesHTML = badges.length > 0 ? badges.join(' <span style="color:#ccc;">|</span> ') : `-`;
                            }

                            htmlString += `
                                <tr style="background-color: ${rowBg}; border-bottom: 1px solid #eee;">
                                    <td style="padding: 12px 18px; border-right: 1px solid #eee; font-weight: 700; color: #222;">${item.name}${detailInfo}</td>
                                    <td style="padding: 12px 18px; text-align: right; font-size: 14px;">${waterBadgesHTML}</td>
                                </tr>
                            `;
                        });
                        htmlString += `</tbody></table>`;
                    } else {
                        htmlString += `<div style="font-size: 14px; color: #888; font-style: italic; margin-bottom: 20px; padding-left: 18px;">In diesem Bereich wurden keine Entnahmestellen erfasst.</div>`;
                    }

                    if (!summaryOnly && area.notes && area.notes.trim() !== '') {
                        htmlString += `
                            <div style="margin-bottom: 25px; padding: 18px; background: #fffbe6; border: 1px solid #ffe58f; border-radius: 4px;">
                                <strong style="text-transform: uppercase; font-size: 12px; color: #b8860b; letter-spacing: 1px; display: block; margin-bottom: 8px;">Bemerkung / Mängel:</strong>
                                <div style="font-size: 14px; line-height: 1.6; color: #333;">${area.notes.replace(/\n/g, '<br>')}</div>
                            </div>
                        `;
                    }

                    // Float-basierte Galerie (100% sicher in html2canvas im Gegensatz zu Flexbox)
                    if (!summaryOnly && area.photos && area.photos.length > 0) {
                        htmlString += `
                            <div style="font-size: 14px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-top: 35px; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 8px;">
                                Fotodokumentation
                            </div>
                        `;
                        
                        for (let i = 0; i < area.photos.length; i += 2) {
                            let photo1 = area.photos[i]; let photo2 = area.photos[i+1];
                            
                            htmlString += `
                                <div class="keep-together" style="width: 100%; margin-bottom: 30px; overflow: hidden; page-break-inside: avoid;">
                                    <div style="float: left; width: 48%; box-sizing: border-box;">
                                        <img src="${photo1.data}" style="width: 100%; height: auto; object-fit: contain; border: 1px solid #ddd; border-radius: 6px; display: block;">
                                        ${photo1.note ? `<div style="padding: 10px 5px; text-align: center; color: #444; font-size: 13px; font-weight: bold;">${photo1.note}</div>` : ''}
                                    </div>
                            `;

                            if (photo2) {
                                htmlString += `
                                    <div style="float: right; width: 48%; box-sizing: border-box;">
                                        <img src="${photo2.data}" style="width: 100%; height: auto; object-fit: contain; border: 1px solid #ddd; border-radius: 6px; display: block;">
                                        ${photo2.note ? `<div style="padding: 10px 5px; text-align: center; color: #444; font-size: 13px; font-weight: bold;">${photo2.note}</div>` : ''}
                                    </div>
                                `;
                            }
                            htmlString += `<div style="clear: both;"></div></div>`;
                        }
                    }
                    htmlString += `</div>`;
                });
                
                htmlString += `
                    <div style="page-break-before: always; height: 1px;"></div>
                    <div style="background: #111; color: #fff; padding: 20px 25px; margin-bottom: 25px; border-radius: 6px;">
                        <h2 style="font-size: 22px; font-weight: 800; margin: 0; text-transform: uppercase; letter-spacing: 1px;">
                            Gesamtabrechnung
                        </h2>
                    </div>
                    
                    <table style="width: 100%; border-collapse: collapse; font-size: 16px; border: 2px solid #111;">
                        <tr style="background: #f4f4f4; border-bottom: 1px solid #ddd;">
                            <td style="padding: 18px 20px; font-weight: 800; width: 70%; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;">Entnahmestellen Gesamt</td>
                            <td style="padding: 18px 20px; text-align: right; font-weight: 800; font-size: 22px;">${totalObjects}</td>
                        </tr>
                        <tr style="border-bottom: 1px solid #ddd;">
                            <td style="padding: 18px 20px; font-weight: 800; color: #0075ff; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;">Kaltwasser-Anschlüsse (KW)</td>
                            <td style="padding: 18px 20px; text-align: right; font-weight: 800; color: #0075ff; font-size: 22px;">${totalKW}x</td>
                        </tr>
                        <tr>
                            <td style="padding: 18px 20px; font-weight: 800; color: #e00034; text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px;">Warmwasser-Anschlüsse (WW)</td>
                            <td style="padding: 18px 20px; text-align: right; font-weight: 800; color: #e00034; font-size: 22px;">${totalWW}x</td>
                        </tr>
                    </table>
                `;
            }
            htmlString += `</div>`; 

            const printElement = document.createElement('div');
            
            // Unsichtbar positionieren, um die App im Hintergrund nicht zu zerschießen
            printElement.style.position = 'absolute'; 
            printElement.style.top = '0'; printElement.style.left = '0';
            printElement.style.width = '794px';  // Zwingend 794px für perfekte A4 Proportion
            printElement.style.backgroundColor = '#ffffff'; 
            printElement.style.zIndex = '99990'; 
            
            printElement.innerHTML = htmlString;
            document.body.appendChild(printElement);

            setTimeout(() => {
                const opt = {
                    margin:       [15, 15, 15, 15], // Echte 15mm Ränder über jsPDF (oben, rechts, unten, links)
                    filename:     `${projektName.replace(/[^a-zA-Z0-9]/g, '_') || 'Protokoll'}${summaryOnly ? '_Mengen' : ''}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 }, // Noch schärfere Bilder
                    pagebreak:    { mode: ['css', 'legacy'], avoid: '.keep-together' }, 
                    html2canvas:  { 
                        scale: 2, // Retina Qualität
                        useCORS: true, 
                        logging: false, 
                        letterRendering: true,
                        scrollY: 0, 
                        scrollX: 0, 
                        windowWidth: 794 
                    },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                html2pdf()
                    .set(opt)
                    .from(printElement)
                    .toPdf()
                    .get('pdf')
                    .then(function (pdf) {
                        const totalPages = pdf.internal.getNumberOfPages();
                        for (let i = 1; i <= totalPages; i++) {
                            pdf.setPage(i);
                            pdf.setFontSize(9);
                            pdf.setTextColor(150);
                            pdf.text('Seite ' + i + ' von ' + totalPages, pdf.internal.pageSize.getWidth() - 15, pdf.internal.pageSize.getHeight() - 8, {align: 'right'});
                        }
                    })
                    .save()
                    .then(() => {
                        document.body.removeChild(printElement);
                        overlay.classList.remove('active');
                    })
                    .catch(err => {
                        console.error("PDF Error: ", err);
                        if(document.body.contains(printElement)) document.body.removeChild(printElement);
                        overlay.classList.remove('active');
                        alert("Es gab ein Problem beim Speichern des PDFs.");
                    });
            }, 800); 
        }

        window.onload = () => { loadData(); initSanitarGrid(); };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW Error:', err));
            });
        }
    </script>
</body>
</html>
