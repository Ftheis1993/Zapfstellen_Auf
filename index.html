<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProtocolApp Pro - Ultimate Mobile</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProtocolApp">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-dark: #09090b;
            --bg-card: #18181b;
            --bg-input: #27272a;
            --accent-red: #e11d48;
            --accent-red-glow: rgba(225, 29, 72, 0.15);
            --accent-blue: #0ea5e9;
            --accent-orange: #f97316;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #3f3f46;
            --radius-lg: 14px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px 15px 40px 15px;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }

        .app-container { width: 100%; max-width: 600px; margin: 0 auto; }

        /* Top Bar */
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 10px; }
        
        .header-date { color: var(--text-muted); font-size: 0.9em; font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .header-date span { color: var(--text-main); font-weight: 600; background: var(--bg-card); padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }

        .header-project-nr { display: flex; align-items: center; gap: 8px; background: var(--bg-card); padding: 5px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); flex-grow: 1; justify-content: flex-end; }
        .header-project-nr label { font-size: 0.75em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .header-project-nr input { background: transparent; border: none; color: var(--text-main); font-weight: 700; font-size: 0.95em; outline: none; width: 100px; text-align: right; font-family: inherit; }
        .header-project-nr input::placeholder { color: #52525b; font-weight: 500; }

        .project-section { display: flex; gap: 10px; margin-bottom: 30px; }
        .project-input-group { flex-grow: 1; background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 12px 15px; display: flex; align-items: center; }
        .project-input-group:focus-within { border-color: var(--accent-red); background-color: #1f1f22; }
        .project-input-group label { font-size: 1em; font-weight: 600; margin-right: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
        .project-input-group input { flex-grow: 1; background: transparent; border: none; color: var(--text-main); font-size: 16px; font-family: inherit; font-weight: 600; outline: none; width: 100%; }

        .action-btn { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); width: 50px; height: 50px; display: flex; justify-content: center; align-items: center; color: var(--text-main); font-size: 1.25em; cursor: pointer; flex-shrink: 0; transition: var(--transition); }
        .action-btn:active { transform: scale(0.92); background-color: var(--bg-input); }

        .divider { display: flex; align-items: center; color: var(--text-muted); margin: 30px 0 15px 0; font-weight: 700; font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.05em; }
        .divider::after { content: ''; flex: 1; margin-left: 15px; border-bottom: 1px solid var(--border-color); }

        /* Kacheln & Buttons */
        #kachelContainer { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
        .bereich-kachel { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 18px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: var(--transition); }
        .bereich-kachel:active { border-color: var(--accent-red); transform: scale(0.98); }
        .kachel-info h3 { margin: 0 0 6px 0; font-size: 1.1em; font-weight: 600; color: var(--text-main); }
        .kachel-info p { margin: 0; font-size: 0.88em; color: var(--text-muted); line-height: 1.4; }
        .kachel-icon { width: 40px; height: 40px; border-radius: var(--radius-md); background-color: var(--bg-input); display: flex; justify-content: center; align-items: center; color: var(--accent-red); font-size: 1em; }

        .new-area-btn { background-color: transparent; border: 2px dashed var(--border-color); border-radius: var(--radius-lg); padding: 18px 20px; display: flex; justify-content: center; align-items: center; gap: 10px; font-size: 1.05em; font-weight: 600; color: var(--text-muted); cursor: pointer; width: 100%; transition: var(--transition); }
        .new-area-btn:active { background-color: var(--bg-input); border-color: var(--accent-red); color: var(--text-main); }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(4px); display: flex; justify-content: center; align-items: flex-end; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background-color: var(--bg-dark); border-top: 1px solid var(--border-color); border-radius: 20px 20px 0 0; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 25px 20px 40px 20px; display: flex; flex-direction: column; gap: 24px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; color: var(--text-main); }
        .modal-header h2 { margin: 0; font-size: 1.3em; font-weight: 700; }
        .close-btn { background: var(--bg-input); border: 1px solid var(--border-color); width: 36px; height: 36px; border-radius: 50%; color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); }
        .close-btn:active { background-color: var(--bg-card); color: var(--text-main); }

        .modal-section-title { font-size: 0.85em; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin: 0 0 12px 0; letter-spacing: 0.05em; }
        
        .input-group { display: flex; flex-direction: column; margin-bottom: 12px; }
        .input-group label { font-weight: 600; font-size: 0.8em; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .input-group input, .input-group textarea { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-main); padding: 12px 14px; outline: none; font-family: inherit; font-size: 16px; transition: var(--transition); }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--accent-red); }
        .input-group textarea { resize: vertical; min-height: 80px; }

        .sanitar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .sanitar-item-btn { background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 14px 15px; color: var(--text-main); font-size: 0.9em; font-weight: 600; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: var(--transition); }
        .sanitar-item-btn:active { background-color: var(--bg-card); border-color: var(--accent-red); }
        .sanitar-item-btn i { color: var(--accent-red); font-size: 1em; opacity: 0.8; }
        .sanitar-item-btn.custom-btn { border-style: dashed; color: var(--text-muted); background: transparent; }
        .sanitar-item-btn.custom-btn:active { border-color: var(--text-main); color: var(--text-main); }
        
        .added-items-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .added-item { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 0.95em; gap: 10px; flex-wrap: wrap; }
        .item-name { font-weight: 600; color: var(--text-main); flex-grow: 1; min-width: 120px; }
        .item-right-side { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
        
        .water-toggles { display: flex; gap: 6px; }
        .water-btn { font-size: 0.75em; font-weight: 700; padding: 6px 12px; border-radius: var(--radius-sm); background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-muted); cursor: pointer; user-select: none; transition: var(--transition); }
        .water-btn.kw.active { border-color: var(--accent-blue); background-color: rgba(14, 165, 233, 0.15); color: var(--accent-blue); }
        .water-btn.ww.active { border-color: var(--accent-orange); background-color: rgba(249, 115, 22, 0.15); color: var(--accent-orange); }

        .zapfstellen-container-inline { display: flex; gap: 8px; align-items: center; }
        .zapfstellen-input-group { display: flex; align-items: center; gap: 4px; background: var(--bg-input); padding: 4px 8px; border-radius: var(--radius-sm); border: 1px solid var(--border-color); }
        .zapfstellen-input-group label { font-size: 0.75em; font-weight: 600; margin: 0; }
        .zapfstellen-input { width: 35px; background: transparent; border: none; color: var(--text-main); text-align: center; outline: none; font-size: 14px; font-weight: 700; padding: 0; }
        
        .remove-btn { color: var(--text-muted); font-size: 1.1em; cursor: pointer; transition: var(--transition); margin-left: 5px; }
        .remove-btn:active { color: var(--accent-red); }

        /* Fotodokumentation Upload */
        .photo-upload-label { display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: var(--bg-input); border: 2px dashed var(--border-color); border-radius: var(--radius-md); padding: 20px; color: var(--text-muted); font-weight: 600; cursor: pointer; gap: 10px; transition: var(--transition); }
        .photo-upload-label:active { background-color: var(--bg-card); border-color: var(--accent-red); color: var(--accent-red); }
        .photo-upload-label i { font-size: 1.8em; color: var(--text-main); }
        
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .photo-item { position: relative; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-color); display: flex; flex-direction: column; background: var(--bg-card); }
        .photo-item img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .photo-delete-btn { position: absolute; top: 5px; right: 5px; background: var(--accent-red); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8em; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 2; }
        .photo-note-input { background: var(--bg-input); border: none; border-top: 1px solid var(--border-color); color: var(--text-main); font-size: 0.8em; padding: 8px; width: 100%; outline: none; font-family: inherit; }
        .photo-note-input:focus { background: var(--bg-card); }
        
        .save-modal-btn { background-color: var(--accent-red); color: white; border: none; border-radius: var(--radius-md); padding: 16px; font-size: 1.05em; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: var(--transition); }
        .save-modal-btn:active { background-color: #be123c; transform: scale(0.98); }
        .delete-area-btn { background: none; border: none; color: var(--text-muted); font-size: 0.9em; cursor: pointer; text-align: center; text-decoration: underline; width: 100%; padding: 10px; transition: var(--transition); }
        .delete-area-btn:active { color: var(--accent-red); }
        
        .reset-app-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 12px; width: 100%; border-radius: var(--radius-md); margin-top: 20px; font-size: 0.95em; cursor: pointer; font-weight: 600; transition: var(--transition); }
        .reset-app-btn:active { background: var(--bg-card); color: var(--accent-red); border-color: var(--accent-red); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-header-bar">
            <div class="header-date">
                Datum: <span id="currentDate">Lade...</span>
            </div>
            <div class="header-project-nr">
                <label for="projektNummer">Projekt-Nr:</label>
                <input type="text" id="projektNummer" placeholder="z.B. PRJ-123" oninput="saveData()">
            </div>
        </div>

        <div class="project-section">
            <div class="project-input-group">
                <label for="projektName"><i class="fas fa-folder-open"></i></label>
                <input type="text" id="projektName" placeholder="Projektname / Bauvorhaben..." oninput="saveData()">
            </div>
            <button class="action-btn" id="pdf-btn" title="PDF Erstellen" onclick="exportToPDF()">
                <i class="fas fa-file-pdf" style="color: var(--accent-red);"></i>
            </button>
        </div>

        <div class="divider">Erfassung</div>
        <div id="kachelContainer"></div>

        <button class="new-area-btn" onclick="createNewArea()">
            <i class="fas fa-plus"></i> Neuer Gebäudebereich
        </button>
        
        <button class="reset-app-btn" onclick="resetApp()"><i class="fas fa-trash-alt"></i> Alle Daten zurücksetzen</button>
    </div>

    <div class="modal-overlay" id="areaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Bereich konfigurieren</h2>
                <button class="close-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>

            <div class="input-group">
                <label><i class="fas fa-tag"></i> Bereich</label>
                <input type="text" id="modalAreaName" oninput="updateCurrentAreaName(this.value)">
            </div>

            <div class="input-group">
                <label><i class="fas fa-pen-to-square"></i> Bemerkungen</label>
                <textarea id="modalAreaNotes" placeholder="Zustand, Mängel festhalten..." oninput="updateCurrentAreaNotes(this.value)"></textarea>
            </div>

            <div>
                <p class="modal-section-title">Fotodokumentation</p>
                <label for="cameraInput" class="photo-upload-label">
                    <i class="fas fa-camera"></i>
                    <span>Foto aufnehmen / Galerie</span>
                </label>
                <input type="file" id="cameraInput" accept="image/*" style="display: none;" onchange="handlePhotoUpload(this)" multiple>
                <div class="photo-grid" id="photoGrid"></div>
            </div>

            <div>
                <p class="modal-section-title">Entnahmestelle hinzufügen</p>
                <div class="sanitar-grid" id="sanitarGrid"></div>
            </div>

            <div>
                <p class="modal-section-title">Einzelauflistung</p>
                <ul class="added-items-list" id="addedItemsList"></ul>
            </div>

            <button class="save-modal-btn" onclick="closeModal()">Fertig & Speichern</button>
            <button class="delete-area-btn" onclick="deleteCurrentArea()">Diesen Bereich löschen</button>
        </div>
    </div>

    <script>
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

        let buildingAreas = [];
        let currentEditingId = null;

        const defaultSanitaryObjects = ["Waschbecken", "Dusche", "Ausgussbecken", "Waschrinne", "Außenzapfstelle", "Zapfstelle", "Systemtrenner", "Stopfen", "Kappe"];

        function saveData() {
            const data = {
                projektName: document.getElementById('projektName').value,
                projektNummer: document.getElementById('projektNummer').value,
                buildingAreas: buildingAreas
            };
            localStorage.setItem('protocolAppDataPro', JSON.stringify(data));
        }

        function loadData() {
            const stored = localStorage.getItem('protocolAppDataPro');
            if(stored) {
                try {
                    const data = JSON.parse(stored);
                    document.getElementById('projektName').value = data.projektName || '';
                    document.getElementById('projektNummer').value = data.projektNummer || '';
                    
                    buildingAreas = data.buildingAreas || [];
                    
                    buildingAreas.forEach(area => {
                        if (area.photos) {
                            area.photos = area.photos.map(p => {
                                if (typeof p === 'string') return { data: p, note: "" };
                                return p;
                            });
                        }
                    });

                    renderAreas();
                } catch(e) { console.error("Could not load data", e); }
            }
        }

        function resetApp() {
            if(confirm("ACHTUNG: Möchtest du wirklich alle eingegebenen Daten und Fotos unwiderruflich löschen?")) {
                localStorage.removeItem('protocolAppDataPro');
                location.reload();
            }
        }

        function initSanitarGrid() {
            const grid = document.getElementById('sanitarGrid');
            grid.innerHTML = '';
            defaultSanitaryObjects.forEach(obj => {
                const btn = document.createElement('div');
                btn.className = 'sanitar-item-btn';
                btn.innerHTML = `<span>${obj}</span> <i class="fas fa-plus"></i>`;
                btn.onclick = () => addSanitaryObject(obj);
                grid.appendChild(btn);
            });
            const customBtn = document.createElement('div');
            customBtn.className = 'sanitar-item-btn custom-btn';
            customBtn.innerHTML = `<span>+ Eigenes...</span> <i class="fas fa-plus"></i>`;
            customBtn.onclick = createCustomObject;
            grid.appendChild(customBtn);
        }

        function createCustomObject() {
            const name = prompt("Bezeichnung der eigenen Entnahmestelle:");
            if (name && name.trim() !== "") addSanitaryObject(name.trim());
        }

        function createNewArea() {
            const newId = Date.now().toString();
            buildingAreas.push({
                id: newId,
                name: "Neuer Gebäudebereich",
                notes: "",
                items: [],
                photos: []
            });
            saveData();
            renderAreas();
            openModal(newId);
        }

        function renderAreas() {
            const container = document.getElementById('kachelContainer');
            container.innerHTML = '';
            
            buildingAreas.forEach(area => {
                let total = area.items.length;
                let text = total === 0 ? 'Keine Entnahmestellen' : total === 1 ? '1 Entnahmestelle' : total + ' Entnahmestellen';
                let photoPreview = (area.photos && area.photos.length > 0) ? ` | <span style="color:var(--text-main);">📸 ${area.photos.length} Foto(s)</span>` : '';
                let notesPreview = area.notes ? `<br><span style="color: var(--text-muted); font-size: 0.85em; display:inline-block; margin-top:4px;">📝 ${area.notes.substring(0, 38)}${area.notes.length > 38 ? '...' : ''}</span>` : '';

                const kachel = document.createElement('div');
                kachel.className = 'bereich-kachel';
                kachel.onclick = () => openModal(area.id);
                kachel.innerHTML = `
                    <div class="kachel-info">
                        <h3>${area.name}</h3>
                        <p>${text}${photoPreview}${notesPreview}</p>
                    </div>
                    <div class="kachel-icon"><i class="fas fa-chevron-right"></i></div>
                `;
                container.appendChild(kachel);
            });
        }

        function openModal(areaId) {
            currentEditingId = areaId;
            const area = buildingAreas.find(a => a.id === areaId);
            document.getElementById('modalAreaName').value = area.name;
            document.getElementById('modalAreaNotes').value = area.notes;
            
            if (!area.photos) area.photos = [];

            renderPhotos();
            renderAddedItemsList();
            document.getElementById('areaModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('areaModal').classList.remove('active');
            renderAreas();
        }

        function updateCurrentAreaName(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.name = val || "Unbenannter Bereich"; saveData(); }
        }

        function updateCurrentAreaNotes(val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if(area) { area.notes = val; saveData(); }
        }

        function handlePhotoUpload(input) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (input.files && input.files.length > 0) {
                Array.from(input.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            const MAX_SIZE = 800; // Schutz vor Abstürzen durch große Bilder
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                            } else {
                                if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            area.photos.push({
                                data: canvas.toDataURL('image/jpeg', 0.6),
                                note: ""
                            });
                            renderPhotos();
                            saveData();
                        }
                        img.src = e.target.result;
                    };
                    reader.readAsDataURL(file);
                });
            }
            input.value = ""; 
        }

        function updatePhotoNote(index, val) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos[index]) {
                area.photos[index].note = val;
                saveData();
            }
        }

        function renderPhotos() {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const grid = document.getElementById('photoGrid');
            grid.innerHTML = '';
            if (area && area.photos) {
                area.photos.forEach((photo, index) => {
                    grid.innerHTML += `
                        <div class="photo-item">
                            <div style="position: relative; width: 100%; aspect-ratio: 1;">
                                <img src="${photo.data}" alt="Doku Foto">
                                <div class="photo-delete-btn" onclick="deletePhoto(${index})"><i class="fas fa-times"></i></div>
                            </div>
                            <input type="text" class="photo-note-input" placeholder="Bemerkung..." value="${photo.note || ''}" oninput="updatePhotoNote(${index}, this.value)">
                        </div>
                    `;
                });
            }
        }

        function deletePhoto(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.photos) {
                area.photos.splice(index, 1);
                renderPhotos();
                saveData();
            }
        }

        function addSanitaryObject(objName) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            const newItem = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 4),
                name: objName,
                kw: false,
                ww: false
            };
            if (objName === "Waschrinne") {
                newItem.zapfstellen = 2;
                newItem.kwCount = 2;
                newItem.wwCount = 2;
            }
            area.items.push(newItem);
            saveData();
            renderAddedItemsList();
        }

        function removeSanitaryObject(index) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            area.items.splice(index, 1);
            saveData();
            renderAddedItemsList();
        }

        function toggleWater(index, type) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) {
                area.items[index][type] = !area.items[index][type];
                saveData();
                renderAddedItemsList();
            }
        }

        function updateZapfstellen(index, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) {
                let val = parseInt(value);
                area.items[index].zapfstellen = isNaN(val) || val < 1 ? 1 : val;
                saveData();
            }
        }

        function updateWaschrinneWater(index, type, value) {
            const area = buildingAreas.find(a => a.id === currentEditingId);
            if (area && area.items[index]) {
                let val = parseInt(value);
                let safeVal = isNaN(val) || val < 0 ? 0 : val;
                if (type === 'kw') area.items[index].kwCount = safeVal;
                if (type === 'ww') area.items[index].wwCount = safeVal;
                saveData();
            }
        }

        function deleteCurrentArea() {
            if (confirm('Möchtest du diesen Bereich komplett löschen?')) {
                buildingAreas = buildingAreas.filter(a => a.id !== currentEditingId);
                saveData();
                closeModal();
            }
        }

        function renderAddedItemsList() {
            const list = document.getElementById('addedItemsList');
            list.innerHTML = '';
            const area = buildingAreas.find(a => a.id === currentEditingId);
            
            if (area.items.length === 0) {
                list.innerHTML = '<li class="added-item" style="color:var(--text-muted); justify-content:center; font-style:italic; background: transparent; border-style: dashed;">Noch keine Entnahmestellen hinzugefügt</li>';
                return;
            }

            area.items.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = 'added-item';

                let waterSectionHTML = '';
                if (item.name === "Waschrinne") {
                    waterSectionHTML = `
                        <div class="zapfstellen-container-inline">
                            <div class="zapfstellen-input-group">
                                <label style="color: var(--text-muted);">Z:</label>
                                <input type="number" min="1" class="zapfstellen-input" value="${item.zapfstellen || 2}" onchange="updateZapfstellen(${index}, this.value)">
                            </div>
                            <div class="zapfstellen-input-group">
                                <label style="color: var(--accent-blue);">KW:</label>
                                <input type="number" min="0" class="zapfstellen-input" value="${item.kwCount !== undefined ? item.kwCount : 2}" onchange="updateWaschrinneWater(${index}, 'kw', this.value)">
                            </div>
                            <div class="zapfstellen-input-group">
                                <label style="color: var(--accent-orange);">WW:</label>
                                <input type="number" min="0" class="zapfstellen-input" value="${item.wwCount !== undefined ? item.wwCount : 2}" onchange="updateWaschrinneWater(${index}, 'ww', this.value)">
                            </div>
                        </div>
                    `;
                } else {
                    waterSectionHTML = `
                        <div class="water-toggles">
                            <span class="water-btn kw ${item.kw ? 'active' : ''}" onclick="toggleWater(${index}, 'kw')">KW</span>
                            <span class="water-btn ww ${item.ww ? 'active' : ''}" onclick="toggleWater(${index}, 'ww')">WW</span>
                        </div>
                    `;
                }

                li.innerHTML = `
                    <div class="item-name">${item.name}</div>
                    <div class="item-right-side">
                        ${waterSectionHTML}
                        <i class="fas fa-trash-can remove-btn" onclick="removeSanitaryObject(${index})"></i>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // --- 100% FEHLERFREIER PDF EXPORT MIT PAARWEISEN BILD-TABELLEN ---
        function exportToPDF() {
            const pdfBtn = document.getElementById('pdf-btn');
            const originalIconHTML = pdfBtn.innerHTML;
            pdfBtn.innerHTML = '<i class="fas fa-spinner fa-spin" style="color: var(--accent-red);"></i>';
            pdfBtn.style.pointerEvents = 'none';

            const projektName = document.getElementById('projektName').value.trim() || 'Projektdokumentation';
            const projektNummer = document.getElementById('projektNummer').value.trim() || '—';
            const datum = document.getElementById('currentDate').textContent;

            // HTML als String bauen - verhindert Render-Abstürze durch iOS RAM-Management
            let htmlString = \`
            <div style="width: 800px; padding: 0 40px; font-family: 'Arial', sans-serif; color: #1e293b; background-color: #ffffff; box-sizing: border-box;">
                
                <div style="background-color: #0f172a; color: #ffffff; padding: 25px 30px; margin-top: 20px; margin-bottom: 30px; border-radius: 8px;">
                    <table style="width: 100%; border-collapse: collapse;">
                        <tr>
                            <td style="vertical-align: bottom;">
                                <h1 style="margin: 0 0 10px 0; font-size: 30px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;">\${projektName}</h1>
                                <div style="font-size: 15px; color: #94a3b8;">Project-Nr: <strong style="color: #ffffff;">\${projektNummer}</strong></div>
                            </td>
                            <td style="text-align: right; vertical-align: bottom;">
                                <div style="font-weight: 700; color: #e11d48; text-transform: uppercase; margin-bottom: 6px; font-size: 15px;">Erfassungsprotokoll</div>
                                <div style="font-size: 14px; color: #94a3b8;">Datum: <strong style="color: #ffffff;">\${datum}</strong></div>
                            </td>
                        </tr>
                    </table>
                </div>
            \`;

            if (buildingAreas.length === 0) {
                htmlString += \`<div style="padding: 20px 40px; color: #64748b; font-size: 14px; text-align: center;">Es wurden keine Gebäudebereiche erfasst.</div>\`;
            } else {
                buildingAreas.forEach(area => {
                    
                    // Tabelle & Notizen
                    htmlString += \`
                        <div class="keep-together" style="margin-bottom: 25px; border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden;">
                            <div style="background-color: #f1f5f9; border-bottom: 1px solid #cbd5e1; padding: 12px 18px;">
                                <table style="width: 100%; border-collapse: collapse;">
                                    <tr>
                                        <td style="width: 15px;"><div style="width: 5px; height: 20px; background-color: #e11d48; border-radius: 2px;"></div></td>
                                        <td><h2 style="font-size: 14px; font-weight: 800; color: #0f172a; margin: 0; text-transform: uppercase;">\${area.name}</h2></td>
                                    </tr>
                                </table>
                            </div>
                            
                            <div style="padding: 18px;">
                    \`;
                    
                    if (area.items.length === 0) {
                        htmlString += \`<div style="font-size: 13px; color: #94a3b8; font-style: italic;">Keine Entnahmestellen dokumentiert.</div>\`;
                    } else {
                        htmlString += \`
                            <table style="width: 100%; border-collapse: collapse; font-size: 14px; margin-bottom: 20px;">
                                <thead>
                                    <tr style="color: #64748b; text-transform: uppercase; border-bottom: 2px solid #e2e8f0;">
                                        <th style="padding: 8px 10px; text-align: left; width: 60%;">Entnahmestelle</th>
                                        <th style="padding: 8px 10px; text-align: right; width: 40%;">Anschluss</th>
                                    </tr>
                                </thead>
                                <tbody>
                        \`;

                        area.items.forEach((item, idx) => {
                            const rowBg = idx % 2 === 0 ? '#ffffff' : '#f8fafc';
                            let detailInfo = ''; let waterBadgesHTML = '';

                            if (item.name === "Waschrinne") {
                                detailInfo = \` <span style="font-size: 12px; color:#64748b; font-weight:normal; margin-left: 6px;">(\${item.zapfstellen || 2} Zapfstellen)</span>\`;
                                let kwMenge = item.kwCount !== undefined ? item.kwCount : 2;
                                let wwMenge = item.wwCount !== undefined ? item.wwCount : 2;

                                let badges = [];
                                if (kwMenge > 0) badges.push(\`<span style="color: #0369a1; font-weight: 700; margin-left: 10px;">\${kwMenge}x KW</span>\`);
                                if (wwMenge > 0) badges.push(\`<span style="color: #ea580c; font-weight: 700; margin-left: 10px;">\${wwMenge}x WW</span>\`);
                                waterBadgesHTML = badges.length > 0 ? badges.join('') : \`<span style="color: #94a3b8;">-</span>\`;
                            } else {
                                let badges = [];
                                if (item.kw) badges.push(\`<span style="color: #0369a1; font-weight: 700; margin-left: 10px;">KW</span>\`);
                                if (item.ww) badges.push(\`<span style="color: #ea580c; font-weight: 700; margin-left: 10px;">WW</span>\`);
                                waterBadgesHTML = badges.length > 0 ? badges.join('') : \`<span style="color: #94a3b8;">-</span>\`;
                            }

                            htmlString += \`
                                <tr style="background-color: \${rowBg}; border-bottom: 1px solid #f1f5f9;">
                                    <td style="padding: 10px; font-weight: 600; color: #1e293b; border-bottom: 1px solid #e2e8f0;">\${item.name}\${detailInfo}</td>
                                    <td style="padding: 10px; text-align: right; border-bottom: 1px solid #e2e8f0;">\${waterBadgesHTML}</td>
                                </tr>
                            \`;
                        });
                        htmlString += \`</tbody></table>\`;
                    }

                    if (area.notes && area.notes.trim() !== '') {
                        htmlString += \`
                            <div style="margin-bottom: 5px; padding: 12px 15px; background-color: #f8fafc; border-left: 4px solid #64748b; font-size: 13px; color: #334155; border-radius: 4px;">
                                <strong style="color: #0f172a; text-transform: uppercase;">Bemerkungen:</strong><br>
                                <div style="margin-top: 6px; line-height: 1.5;">\${area.notes.replace(/\\n/g, '<br>')}</div>
                            </div>
                        \`;
                    }
                    htmlString += \`</div></div>\`; // Ende Tabelle

                    // FOTODOKUMENTATION: Absolut seitenumbruchsicher durch 2-Spalten-Tabellenstrukturen
                    if (area.photos && area.photos.length > 0) {
                        htmlString += \`
                            <div style="margin-top: 20px; margin-bottom: 30px;">
                                <div style="font-size: 13px; color: #0f172a; text-transform: uppercase; font-weight: 700; margin-bottom: 15px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 8px;">
                                    Fotodokumentation: \${area.name} (\${area.photos.length})
                                </div>
                        \`;
                        
                        // Schleife springt in 2er Schritten durch die Bilder
                        for (let i = 0; i < area.photos.length; i += 2) {
                            let photo1 = area.photos[i];
                            let photo2 = area.photos[i+1];
                            
                            let note1Html = photo1.note ? \`<div style="font-size: 12px; color: #475569; margin-top: 8px; text-align: center; word-wrap: break-word;">\${photo1.note}</div>\` : '';
                            let note2Html = (photo2 && photo2.note) ? \`<div style="font-size: 12px; color: #475569; margin-top: 8px; text-align: center; word-wrap: break-word;">\${photo2.note}</div>\` : '';
                            
                            // Jedes Paar ist in einer eigenen Tabelle eingesperrt. Passt das Paar nicht mehr auf die Seite,
                            // rutscht die komplette Tabelle unbeschnitten auf das nächste Blatt.
                            htmlString += \`
                                <table class="keep-together" style="width: 100%; border-collapse: collapse; margin-bottom: 25px; table-layout: fixed;">
                                    <tr>
                                        <td style="width: 48%; vertical-align: top; text-align: center;">
                                            <img src="\${photo1.data}" style="width: 100%; height: auto; border: 1px solid #cbd5e1; border-radius: 6px; display: block; margin: 0 auto;">
                                            \${note1Html}
                                        </td>
                                        <td style="width: 4%;"></td>
                                        <td style="width: 48%; vertical-align: top; text-align: center;">
                                            \${photo2 ? \`
                                                <img src="\${photo2.data}" style="width: 100%; height: auto; border: 1px solid #cbd5e1; border-radius: 6px; display: block; margin: 0 auto;">
                                                \${note2Html}
                                            \` : ''}
                                        </td>
                                    </tr>
                                </table>
                            \`;
                        }
                        htmlString += \`</div>\`;
                    }
                });
            }

            htmlString += \`</div>\`; // Close main container

            const opt = {
                margin:       [15, 0, 15, 0], // Oben und unten sauberer Abstand auf jeder Seite
                filename:     \`\${projektNummer}_\${projektName.replace(/[^a-zA-Z0-9]/g, '_') || 'Export'}.pdf\`,
                image:        { type: 'jpeg', quality: 0.95 },
                pagebreak:    { mode: ['css', 'legacy'], avoid: '.keep-together' }, // Erkennt die Klassen und schützt sie
                html2canvas:  { 
                    scale: 1.2, // RAM-Schutz für Mobilgeräte verhindert leere/abgebrochene Seiten
                    useCORS: true, 
                    logging: false
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            // Direkte String-Verarbeitung
            html2pdf().set(opt).from(htmlString).save().then(() => {
                pdfBtn.innerHTML = originalIconHTML;
                pdfBtn.style.pointerEvents = 'auto';
            }).catch(err => {
                console.error("PDF Error: ", err);
                pdfBtn.innerHTML = originalIconHTML;
                pdfBtn.style.pointerEvents = 'auto';
                alert("Fehler beim Erstellen der PDF.");
            });
        }

        // Init Load & PWA
        window.onload = () => {
            loadData();
            initSanitarGrid();
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA SW registriert.', reg))
                    .catch(err => console.error('SW Error:', err));
            });
        }
    </script>
</body>
</html>
