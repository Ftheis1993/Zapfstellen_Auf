<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProtocolApp</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ProtocolApp">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-base: #000000;
            --bg-panel: #0f0f0f;
            --bg-input: #1a1a1a;
            --accent-primary: #ff0000;
            --accent-primary-hover: #cc0000;
            --accent-red: #ff3333;
            --text-dark: #ffffff;
            --text-dim: #999999;
            --border-light: #2a2a2a;
            --radius-soft: 16px;
            --radius-inner: 10px;
            --shadow-soft: 0 4px 20px rgba(255, 0, 0, 0.05);
            --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.8);
            --transition-smooth: all 0.2s ease;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-dark);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0; padding: 0;
            letter-spacing: -0.01em;
            -webkit-font-smoothing: antialiased;
        }
        body.modal-open { overflow: hidden; }

        /* --- TOAST NOTIFICATION --- */
        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--bg-panel); border: 1px solid var(--border-light);
            color: var(--text-dark); padding: 12px 22px;
            border-radius: 50px; font-size: 0.88em; font-weight: 600;
            z-index: 99999; white-space: nowrap; pointer-events: none;
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
            box-shadow: var(--shadow-card); opacity: 0;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.success { border-color: #22c55e; color: #22c55e; }
        .toast.error   { border-color: var(--accent-primary); color: var(--accent-primary); }

        /* --- APP WRAPPER --- */
        .app-container { width: 100%; max-width: 600px; margin: 0 auto; padding: 30px 20px 100px 20px; }

        .brand-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; border-bottom: 1px solid var(--border-light); padding-bottom: 15px;
        }
        .brand-logo { font-size: 1.4em; font-weight: 800; color: var(--text-dark); letter-spacing: -0.5px; text-transform: uppercase; }
        .brand-logo span { color: var(--accent-primary); }
        .date-badge { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 6px 12px; border-radius: 50px; font-size: 0.85em; font-weight: 500; color: var(--text-dim); }

        /* --- STATS BAR --- */
        .stats-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-pill { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: var(--radius-inner); padding: 12px 10px; text-align: center; }
        .stat-pill .stat-val { font-size: 1.5em; font-weight: 800; color: var(--text-dark); display: block; }
        .stat-pill .stat-label { font-size: 0.7em; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-pill.kw .stat-val { color: #60a5fa; }
        .stat-pill.ww .stat-val { color: var(--accent-primary); }

        /* --- FORMS & PANELS --- */
        .project-panel {
            background: var(--bg-panel); border: 1px solid var(--border-light);
            border-radius: var(--radius-soft); padding: 25px; margin-bottom: 30px;
            box-shadow: var(--shadow-soft);
        }
        .input-block { margin-bottom: 20px; }
        .input-block:last-child { margin-bottom: 0; }
        .input-block label { display: block; font-size: 0.8em; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-block input, .input-block textarea {
            width: 100%; background: var(--bg-input); border: 1px solid transparent;
            color: var(--text-dark); padding: 14px 16px; border-radius: var(--radius-inner);
            font-family: inherit; font-size: 16px; font-weight: 500; outline: none;
            transition: var(--transition-smooth);
        }
        .input-block input:focus, .input-block textarea:focus {
            background: #111; border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(255,0,0,0.15);
        }
        .input-block textarea { resize: vertical; min-height: 90px; line-height: 1.5; overflow: hidden; }

        .section-title { font-size: 1.1em; font-weight: 700; color: var(--text-dark); margin: 35px 0 15px 0; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- EMPTY STATE --- */
        .empty-state {
            text-align: center; padding: 50px 20px;
            border: 1px dashed var(--border-light); border-radius: var(--radius-soft);
            margin-bottom: 20px;
        }
        .empty-state i { font-size: 2.5em; color: #333; display: block; margin-bottom: 15px; }
        .empty-state p { color: var(--text-dim); margin: 0; font-size: 0.9em; line-height: 1.5; }

        /* --- AREA CARDS --- */
        #kachelContainer { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .area-card {
            background: var(--bg-panel); border: 1px solid var(--border-light);
            border-radius: var(--radius-soft); padding: 20px; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-card); transition: var(--transition-smooth);
        }
        .area-card:hover { border-color: #444; box-shadow: var(--shadow-soft); transform: translateY(-2px); }
        .area-card:active { transform: translateY(0); }
        .area-info { flex-grow: 1; padding-right: 10px; min-width: 0; }
        .area-info h3 { margin: 0 0 6px 0; font-size: 1.1em; font-weight: 600; color: var(--text-dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .area-info p  { margin: 0; font-size: 0.85em; color: var(--text-dim); }
        .area-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .area-dup-btn {
            background: none; border: 1px solid transparent; color: #555;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-smooth); font-size: 0.9em;
        }
        .area-dup-btn:hover  { color: var(--accent-primary); border-color: var(--border-light); }
        .area-dup-btn:active { transform: scale(0.85); }
        .area-arrow { color: #444; font-size: 1.2em; transition: var(--transition-smooth); }
        .area-card:hover .area-arrow { color: var(--accent-primary); transform: translateX(4px); }

        /* --- BUTTONS --- */
        .btn-primary, .btn-outline, .btn-danger, .btn-secondary, .btn-word {
            width: 100%; padding: 16px; font-size: 0.95em; font-weight: 600;
            border-radius: var(--radius-inner); cursor: pointer; text-align: center;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: var(--transition-smooth); margin-bottom: 12px; font-family: inherit;
            text-transform: uppercase; letter-spacing: 0.5px; border: none;
        }
        .btn-primary  { background: var(--accent-primary); color: #fff; box-shadow: 0 4px 15px rgba(255,0,0,0.2); }
        .btn-primary:hover  { background: var(--accent-primary-hover); }
        .btn-primary:active { transform: scale(0.98); }

        .btn-word { background: #2b579a; color: #fff; box-shadow: 0 4px 15px rgba(43,87,154,0.2); }
        .btn-word:hover { background: #1e3f73; }
        .btn-word:active { transform: scale(0.98); }

        .btn-secondary { background: var(--bg-panel); color: var(--text-dark); border: 1px solid var(--border-light); box-shadow: var(--shadow-card); }
        .btn-secondary:active { background: var(--bg-input); border-color: #444; transform: scale(0.98); }

        .btn-outline { background: transparent; color: var(--accent-primary); border: 2px dashed #444; }
        .btn-outline:active { background: rgba(255,0,0,0.1); border-color: var(--accent-primary); transform: scale(0.98); }

        .btn-danger { background: transparent; color: var(--accent-red); border: 1px solid rgba(255,51,51,0.3); margin-top: 40px; }
        .btn-danger:active { background: rgba(255,51,51,0.1); border-color: var(--accent-red); }

        /* --- MODAL (SLIDE-UP) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: flex-end;
            z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--bg-base); border-top: 2px solid var(--accent-primary);
            width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto;
            padding: 10px 20px 40px 20px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
            -webkit-overflow-scrolling: touch;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-drag-handle { width: 40px; height: 4px; background: #2a2a2a; border-radius: 2px; margin: 12px auto 20px; }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { margin: 0; font-size: 1.2em; font-weight: 700; color: var(--text-dark); text-transform: uppercase; }
        .close-btn {
            background: var(--bg-panel); border: 1px solid var(--border-light);
            color: var(--text-dark); width: 36px; height: 36px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.1em; cursor: pointer; transition: var(--transition-smooth);
        }
        .close-btn:hover  { background: #222; color: var(--accent-primary); border-color: var(--accent-primary); }
        .close-btn:active { transform: scale(0.9); }

        /* --- PHOTO GRID --- */
        .photo-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 15px; }
        .photo-item { border: 1px solid var(--border-light); background: var(--bg-panel); border-radius: var(--radius-inner); overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow-card); }
        .photo-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
        .photo-note { background: transparent; border: none; border-top: 1px solid var(--border-light); color: var(--accent-primary); padding: 12px; font-size: 0.85em; font-weight: 600; outline: none; width: 100%; text-align: center; font-family: inherit; }
        .photo-note::placeholder { color: var(--text-dim); font-weight: 400; }
        .photo-delete { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.8); color: var(--text-dark); border: 1px solid var(--border-light); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition-smooth); }
        .photo-delete:active { transform: scale(0.9); background: var(--accent-primary); border-color: var(--accent-primary); }

        /* --- ITEMS & OBJECT MANAGEMENT --- */
        .item-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 25px; }
        .item-btn { background: var(--bg-panel); border: 1px solid var(--border-light); padding: 14px 10px; color: var(--text-dark); font-size: 0.85em; font-weight: 500; text-align: center; border-radius: var(--radius-inner); cursor: pointer; transition: var(--transition-smooth); font-family: inherit; }
        .item-btn:hover  { border-color: #555; background: #1a1a1a; }
        .item-btn:active { border-color: var(--accent-primary); transform: scale(0.97); color: var(--accent-primary); }

        .added-list { list-style: none; padding: 0; margin: 0 0 25px 0; display: flex; flex-direction: column; gap: 10px; }
        .added-item { background: var(--bg-panel); border: 1px solid var(--border-light); border-radius: var(--radius-inner); padding: 16px; display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; border-left: 3px solid var(--border-light); transition: var(--transition-smooth); }
        .added-item:hover { border-left-color: var(--accent-primary); }
        .item-name { font-weight: 600; font-size: 0.95em; color: var(--text-dark); flex-grow: 1; min-width: 100px; }
        .item-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

        .toggle-btn { background: var(--bg-input); border: 1px solid var(--border-light); color: var(--text-dim); padding: 6px 12px; font-size: 0.8em; font-weight: 600; border-radius: 50px; cursor: pointer; transition: var(--transition-smooth); font-family: inherit; }
        .toggle-btn.active.kw { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: #3b82f6; }
        .toggle-btn.active.ww { background: rgba(255,0,0,0.1);   color: var(--accent-primary); border-color: var(--accent-primary); }

        .number-input { display: flex; align-items: center; gap: 4px; background: var(--bg-input); border: 1px solid var(--border-light); padding: 4px 8px; border-radius: 8px; }
        .number-input span { font-size: 0.75em; font-weight: 600; color: var(--text-dim); }
        .number-input input { background: transparent; border: none; color: var(--text-dark); width: 30px; text-align: center; font-size: 0.95em; font-weight: 600; outline: none; padding: 0; font-family: inherit; }

        .trash-btn { color: var(--text-dim); background: transparent; border: none; font-size: 1.1em; cursor: pointer; padding: 5px; margin-left: 4px; transition: var(--transition-smooth); }
        .trash-btn:hover  { color: var(--accent-primary); }
        .trash-btn:active { transform: scale(0.8); }

        /* --- MODERNES DRUCK-DESIGN (Wird nur beim Drucken/PDF-Erstellen aktiv) --- */
        #print-container { display: none; }
        
        @media print {
            body { background: white !important; color: black !important; font-family: 'Inter', Arial, sans-serif; }
            #main-app, #areaModal, #toast { display: none !important; }
            #print-container { display: block !important; padding: 20px; }
            
            /* Modern Header */
            .print-header { border-bottom: 4px solid black; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end; }
            .print-header h1 { margin: 0; font-size: 28px; font-weight: 800; text-transform: uppercase; letter-spacing: -1px; }
            .print-header .meta { text-align: right; font-size: 14px; font-weight: 600; color: #555; }
            .print-header .meta strong { color: black; }

            /* Modern Cards */
            .print-area-card { border: 2px solid black; margin-bottom: 30px; page-break-inside: avoid; box-shadow: 4px 4px 0px rgba(0,0,0,0.1); }
            .print-area-header { background: #000; color: #fff; padding: 12px 15px; margin: 0; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
            .print-area-content { padding: 15px; }

            /* Modern Table */
            .print-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
            .print-table th, .print-table td { border-bottom: 1px solid #ddd; padding: 10px 5px; text-align: left; font-size: 14px; }
            .print-table th { color: #000; border-bottom: 2px solid #000; font-weight: 700; text-transform: uppercase; font-size: 12px; }
            
            /* Styling für die Zähler-Badges im Druck */
            .badge-kw { background: #ebf5ff; color: #2563eb; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 12px; border: 1px solid #bfdbfe; margin-left: 4px; }
            .badge-ww { background: #fef2f2; color: #dc2626; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 12px; border: 1px solid #fecaca; margin-left: 4px; }

            .print-notes { background: #f9f9f9; border-left: 4px solid #ff0000; padding: 12px; margin-top: 15px; font-size: 13px; font-weight: 500; }
            
            /* Modern Photo Grid */
            .print-photo-grid { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
            .print-photo { width: calc(50% - 10px); border: 1px solid #ddd; padding: 5px; background: #fff; page-break-inside: avoid; }
            .print-photo img { width: 100%; height: auto; max-height: 250px; object-fit: cover; }
            .print-photo-note { font-size: 12px; margin-top: 8px; font-weight: 600; text-align: center; color: #333; }

            /* Summary Block */
            .print-summary { margin-top: 40px; border: 2px solid black; padding: 20px; page-break-inside: avoid; }
            .print-summary h2 { margin: 0 0 15px 0; font-size: 20px; text-transform: uppercase; border-bottom: 2px solid black; padding-bottom: 10px; }
            .print-summary-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #ccc; font-weight: 600; }
            .print-summary-row:last-child { border-bottom: none; }
            .print-summary-val { font-weight: 800; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="toast" class="toast"></div>

    <div class="app-container" id="main-app">
        <header class="brand-header">
            <div class="brand-logo">Protocol<span>App</span></div>
            <div class="date-badge" id="currentDate">--.--.----</div>
        </header>

        <div class="project-panel">
            <div class="input-block">
                <label>Projekt / Bauvorhaben</label>
                <input type="text" id="projektName" placeholder="Z.B. BVH Mustermann…" oninput="debouncedSave()">
            </div>
        </div>

        <div class="stats-bar" id="statsBar" style="display:none;">
            <div class="stat-pill">
                <span class="stat-val" id="statAreas">0</span>
                <span class="stat-label">Bereiche</span>
            </div>
            <div class="stat-pill">
                <span class="stat-val" id="statTotal">0</span>
                <span class="stat-label">Komp.</span>
            </div>
            <div class="stat-pill kw">
                <span class="stat-val" id="statKW">0</span>
                <span class="stat-label">KW</span>
            </div>
            <div class="stat-pill ww">
                <span class="stat-val" id="statWW">0</span>
                <span class="stat-label">WW</span>
            </div>
        </div>

        <div class="section-title">Erfasste Bereiche</div>
        <div id="kachelContainer"></div>

        <button type="button" class="btn-outline" onclick="createNewArea()">
            <i class="fas fa-plus"></i> Neuen Bereich hinzufügen
        </button>

        <div class="section-title">Export &amp; Protokolle</div>

        <button type="button" class="btn-primary" onclick="printNativeReport(false)">
            <i class="fas fa-file-pdf"></i> PDF / Drucken (Komplett)
        </button>

        <button type="button" class="btn-secondary" onclick="printNativeReport(true)">
            <i class="fas fa-list"></i> PDF / Drucken (Nur Übersicht)
        </button>

        <button type="button" class="btn-word" onclick="exportToWord(false)">
            <i class="fas fa-file-word"></i> Word-Dokument (.doc)
        </button>

        <button type="button" class="btn-danger" onclick="resetApp()">
            <i class="fas fa-trash-alt"></i> Alle Daten zurücksetzen
        </button>
    </div>

    <div id="print-container"></div>

    <div class="modal-overlay" id="areaModal" onclick="handleBackdropClick(event)">
        <div class="modal-content" id="modalContent">
            <div class="modal-drag-handle"></div>

            <div class="modal-header">
                <h2>Bereich bearbeiten</h2>
                <button type="button" class="close-btn" onclick="closeModal()" aria-label="Schließen">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="input-block">
                <label for="modalAreaName">Name des Bereichs (z.B. Bad 1. OG)</label>
                <input type="text" id="modalAreaName" placeholder="Bereichsname…"
                    oninput="updateCurrentAreaName(this.value)"
                    onkeydown="if(event.key==='Enter') document.getElementById('modalAreaNotes').focus()">
            </div>

            <div class="input-block">
                <label for="modalAreaNotes">Mängel &amp; Notizen</label>
                <textarea id="modalAreaNotes"
                    placeholder="Besonderheiten oder Zustand festhalten…"
                    oninput="updateCurrentAreaNotes(this.value); autoResize(this)"></textarea>
            </div>

            <div class="section-title">Fotos &amp; Dokumentation</div>
            <button type="button" class="btn-secondary"
                style="border-style:dashed; color:var(--text-dark); border-color:var(--border-light);"
                onclick="document.getElementById('cameraInput').click()">
                <i class="fas fa-camera" style="color:var(--accent-primary);"></i> Foto hinzufügen
            </button>
            <input type="file" id="cameraInput" accept="image/*" style="display:none;" onchange="handlePhotoUpload(this)" multiple>
            <div class="photo-grid" id="photoGrid"></div>

            <div class="section-title">Entnahmestelle</div>
            <div class="item-grid" id="sanitarGrid"></div>

            <div class="section-title">Aktuelle Liste</div>
            <ul class="added-list" id="addedItemsList"></ul>

            <button type="button" class="btn-primary" onclick="closeModal()">
                <i class="fas fa-check"></i> Speichern &amp; Schließen
            </button>
            <button type="button" class="btn-danger" style="margin-top:20px; border:none; background:transparent;"
                onclick="deleteCurrentArea()">
                <i class="fas fa-trash-alt"></i> Diesen Bereich löschen
            </button>
        </div>
    </div>

    <script>
    'use strict';

    // ─── INIT ──────────────────────────────────────────────────────────────────
    document.getElementById('currentDate').textContent =
        new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });

    let buildingAreas   = [];
    let currentEditingId = null;

    const defaultSanitaryObjects = [
        'Waschbecken', 'WC', 'Dusche', 'Badewanne',
        'Ausgussbecken', 'Spülbecken', 'Zapfstelle'
    ];

    // ─── UTILITY HELPERS ───────────────────────────────────────────────────────
    function escapeHTML(str) {
        const el = document.createElement('div');
        el.textContent = (str != null) ? String(str) : '';
        return el.innerHTML;
    }

    function debounce(fn, delay) {
        let timer;
        return function (...args) {
            clearTimeout(timer);
            timer = setTimeout(() => fn.apply(this, args), delay);
        };
    }
    
    const debouncedSave = debounce(saveData, 400);

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = el.scrollHeight + 'px';
    }

    function vibrate(pattern = [10]) {
        if (navigator.vibrate) navigator.vibrate(pattern);
    }

    // ─── TOAST ─────────────────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg, type = '') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className   = `toast ${type} show`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // ─── DATA / PERSISTENCE ────────────────────────────────────────────────────
    function saveData() {
        try {
            localStorage.setItem('protocolApp_data_blackred', JSON.stringify({
                projektName: document.getElementById('projektName').value,
                buildingAreas
            }));
        } catch (e) {
            showToast('Speicherfehler – Speicher voll?', 'error');
        }
    }

    function loadData() {
        const raw = localStorage.getItem('protocolApp_data_blackred');
        if (!raw) return;
        try {
            const data = JSON.parse(raw);
            document.getElementById('projektName').value = data.projektName || '';
            buildingAreas = (data.buildingAreas || []).map(area => ({
                ...area,
                photos: (area.photos || []).map(p => typeof p === 'string' ? { data: p, note: '' } : p),
                items:  area.items || []
            }));
            renderAreas();
        } catch (e) {
            console.error('Fehler beim Laden:', e);
            buildingAreas = [];
        }
    }

    function resetApp() {
        if (confirm('Möchten Sie wirklich alle Daten und Bilder löschen?\nDieser Vorgang kann nicht rückgängig gemacht werden.')) {
            localStorage.clear();
            location.reload();
        }
    }

    // ─── STATS ─────────────────────────────────────────────────────────────────
    function calcStats() {
        let total = 0, kw = 0, ww = 0;
        buildingAreas.forEach(area => {
            total += area.items.length;
            area.items.forEach(item => {
                if (item.name === 'Waschrinne') {
                    kw += item.kwCount ?? 2;
                    ww += item.wwCount ?? 2;
                } else {
                    if (item.kw) kw++;
                    if (item.ww) ww++;
                }
            });
        });
        return { total, kw, ww };
    }

    function updateStats() {
        const bar = document.getElementById('statsBar');
        if (buildingAreas.length === 0) { bar.style.display = 'none'; return; }
        const { total, kw, ww } = calcStats();
        document.getElementById('statAreas').textContent = buildingAreas.length;
        document.getElementById('statTotal').textContent = total;
        document.getElementById('statKW').textContent    = kw;
        document.getElementById('statWW').textContent    = ww;
        bar.style.display = 'flex';
    }

    // ─── AREA CARDS ────────────────────────────────────────────────────────────
    function createNewArea() {
        const id = Date.now().toString();
        buildingAreas.push({ id, name: '', notes: '', items: [], photos: [] });
        saveData(); renderAreas(); openModal(id); vibrate();
    }

    function duplicateArea(id, event) {
        event.stopPropagation();
        const src = buildingAreas.find(a => a.id === id);
        if (!src) return;
        const copy = JSON.parse(JSON.stringify(src));
        copy.id   = Date.now().toString();
        copy.name = (src.name || 'Bereich') + ' (Kopie)';
        buildingAreas.push(copy);
        saveData(); renderAreas();
        showToast('Bereich dupliziert');
        vibrate();
    }

    function renderAreas() {
        const container = document.getElementById('kachelContainer');
        container.innerHTML = '';

        if (buildingAreas.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-layer-group"></i>
                    <p>Noch keine Bereiche erfasst.<br>Tippe auf „Neuen Bereich hinzufügen".</p>
                </div>`;
            updateStats(); return;
        }

        buildingAreas.forEach(area => {
            const photoCount = area.photos?.length ?? 0;
            const compCount  = area.items.length;
            const meta = [
                compCount > 0 ? `<strong>${compCount}</strong> Komp.` : 'Keine Komponenten',
                photoCount > 0 ? `<i class="fas fa-image" style="font-size:.8em;"></i> ${photoCount}` : null
            ].filter(Boolean).join(' &bull; ');

            const notesHtml = area.notes
                ? `<div style="color:var(--text-dim);font-size:.82em;margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px;">
                       <i class="fas fa-info-circle" style="margin-right:4px;opacity:.6;"></i>${escapeHTML(area.notes.substring(0, 60))}${area.notes.length > 60 ? '…' : ''}
                   </div>`
                : '';

            const card = document.createElement('div');
            card.className = 'area-card';
            card.onclick   = () => openModal(area.id);
            card.innerHTML = `
                <div class="area-info">
                    <h3>${escapeHTML(area.name || 'Ohne Name')}</h3>
                    <p>${meta}</p>
                    ${notesHtml}
                </div>
                <div class="area-actions">
                    <button type="button" class="area-dup-btn" title="Bereich duplizieren"
                        onclick="duplicateArea('${escapeHTML(area.id)}', event)">
                        <i class="fas fa-copy"></i>
                    </button>
                    <div class="area-arrow"><i class="fas fa-chevron-right"></i></div>
                </div>`;
            container.appendChild(card);
        });

        updateStats();
    }

    // ─── MODAL ─────────────────────────────────────────────────────────────────
    function openModal(areaId) {
        currentEditingId = areaId;
        const area = buildingAreas.find(a => a.id === areaId);
        if (!area) return;

        document.getElementById('modalAreaName').value = area.name || '';
        const notesEl = document.getElementById('modalAreaNotes');
        notesEl.value = area.notes || '';
        setTimeout(() => autoResize(notesEl), 0);

        renderPhotos();
        renderAddedItemsList();
        document.getElementById('areaModal').classList.add('active');
        document.body.classList.add('modal-open');

        if (!area.name) setTimeout(() => document.getElementById('modalAreaName').focus(), 420);
    }

    function closeModal() {
        const name = document.getElementById('modalAreaName').value.trim();
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area) area.name = name || 'Ohne Name';
        saveData();
        document.getElementById('areaModal').classList.remove('active');
        document.body.classList.remove('modal-open');
        currentEditingId = null;
        renderAreas();
    }

    function handleBackdropClick(e) {
        if (e.target === document.getElementById('areaModal')) closeModal();
    }

    function updateCurrentAreaName(val) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area) { area.name = val; debouncedSave(); }
    }

    function updateCurrentAreaNotes(val) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area) { area.notes = val; debouncedSave(); }
    }

    function deleteCurrentArea() {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        const label = area?.name || 'diesen Bereich';
        if (!confirm(`„${label}" und alle Inhalte löschen?`)) return;
        buildingAreas = buildingAreas.filter(a => a.id !== currentEditingId);
        saveData();
        document.getElementById('areaModal').classList.remove('active');
        document.body.classList.remove('modal-open');
        currentEditingId = null;
        renderAreas();
        showToast('Bereich gelöscht');
        vibrate([20, 50, 20]);
    }

    // ─── PHOTOS ────────────────────────────────────────────────────────────────
    function handlePhotoUpload(input) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (!input.files?.length || !area) return;

        const files = Array.from(input.files);
        let done = 0;

        files.forEach(file => {
            const reader = new FileReader();
            reader.onerror = () => { done++; showToast('Fehler beim Lesen einer Datei', 'error'); };
            reader.onload  = e => {
                const img  = new Image();
                img.onerror = () => { done++; showToast('Ungültiges Bild', 'error'); };
                img.onload  = () => {
                    const MAX = 800;
                    let { width: w, height: h } = img;
                    if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
                    else       { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
                    const canvas = document.createElement('canvas');
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    area.photos.push({ data: canvas.toDataURL('image/jpeg', 0.7), note: '' });
                    if (++done === files.length) {
                        saveData(); renderPhotos();
                        showToast(`${files.length} Foto${files.length > 1 ? 's' : ''} hinzugefügt`);
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
        input.value = '';
    }

    function updatePhotoNote(index, val) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area?.photos?.[index] != null) { area.photos[index].note = val; debouncedSave(); }
    }

    function renderPhotos() {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        const grid = document.getElementById('photoGrid');
        grid.innerHTML = '';
        if (!area?.photos?.length) return;

        area.photos.forEach((photo, i) => {
            const item = document.createElement('div');
            item.className = 'photo-item';

            const del = document.createElement('button');
            del.type = 'button'; del.className = 'photo-delete';
            del.setAttribute('aria-label', 'Foto löschen');
            del.innerHTML = '<i class="fas fa-times"></i>';
            del.onclick = () => deletePhoto(i);

            const img = document.createElement('img');
            img.src = photo.data; img.alt = `Foto ${i + 1}`;

            const noteInput = document.createElement('input');
            noteInput.type  = 'text';
            noteInput.className   = 'photo-note';
            noteInput.placeholder = 'Notiz…';
            noteInput.value = photo.note || '';
            noteInput.oninput = e => updatePhotoNote(i, e.target.value);

            item.append(del, img, noteInput);
            grid.appendChild(item);
        });
    }

    function deletePhoto(index) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (!area?.photos) return;
        area.photos.splice(index, 1);
        saveData(); renderPhotos(); vibrate();
    }

    // ─── SANITARY GRID ─────────────────────────────────────────────────────────
    function initSanitarGrid() {
        const grid = document.getElementById('sanitarGrid');
        grid.innerHTML = '';
        defaultSanitaryObjects.forEach(obj => {
            const btn = document.createElement('button');
            btn.type = 'button'; btn.className = 'item-btn'; btn.textContent = obj;
            btn.onclick = () => { addSanitaryObject(obj); vibrate(); };
            grid.appendChild(btn);
        });
        const custom = document.createElement('button');
        custom.type = 'button'; custom.className = 'item-btn';
        custom.style.borderStyle = 'dashed'; custom.style.color = 'var(--accent-primary)';
        custom.innerHTML = '<i class="fas fa-plus"></i> Eigene…';
        custom.onclick   = createCustomObject;
        grid.appendChild(custom);
    }

    function createCustomObject() {
        const name = prompt('Bezeichnung der neuen Entnahmestelle:');
        if (name?.trim()) { addSanitaryObject(name.trim()); vibrate(); }
    }

    function addSanitaryObject(objName) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (!area) return;
        const item = { id: Date.now().toString(), name: objName, kw: false, ww: false };
        if (objName === 'Waschrinne') { item.zapfstellen = 2; item.kwCount = 2; item.wwCount = 2; }
        area.items.push(item);
        saveData(); renderAddedItemsList();
    }

    function removeSanitaryObject(index) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (!area) return;
        area.items.splice(index, 1);
        saveData(); renderAddedItemsList(); vibrate();
    }

    function toggleWater(index, type) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area?.items?.[index] != null) {
            area.items[index][type] = !area.items[index][type];
            saveData(); renderAddedItemsList(); vibrate();
        }
    }

    function updateZapfstellen(index, value) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area?.items?.[index] != null) {
            const v = parseInt(value);
            area.items[index].zapfstellen = (!v || v < 1) ? 1 : v;
            saveData();
            renderAddedItemsList(); 
        }
    }

    function updateWaschrinneWater(index, type, value) {
        const area = buildingAreas.find(a => a.id === currentEditingId);
        if (area?.items?.[index] != null) {
            const v = parseInt(value);
            area.items[index][type === 'kw' ? 'kwCount' : 'wwCount'] = (isNaN(v) || v < 0) ? 0 : v;
            saveData();
        }
    }

    function renderAddedItemsList() {
        const list = document.getElementById('addedItemsList');
        list.innerHTML = '';
        const area = buildingAreas.find(a => a.id === currentEditingId);

        if (!area?.items?.length) {
            list.innerHTML = `<li class="added-item" style="color:var(--text-dim);justify-content:center;border-style:dashed;box-shadow:none;">Noch keine Komponenten erfasst</li>`;
            return;
        }

        area.items.forEach((item, i) => {
            const li = document.createElement('li');
            li.className = 'added-item';

            let controlsHTML;
            if (item.name === 'Waschrinne') {
                controlsHTML = `
                    <div class="number-input">
                        <span>Z</span>
                        <input type="number" min="1" value="${item.zapfstellen ?? 2}" onchange="updateZapfstellen(${i}, this.value)">
                    </div>
                    <div class="number-input" style="background:rgba(59,130,246,.1);border-color:#3b82f6;">
                        <span>KW</span>
                        <input type="number" min="0" value="${item.kwCount ?? 2}" onchange="updateWaschrinneWater(${i},'kw',this.value)" style="color:#60a5fa;">
                    </div>
                    <div class="number-input" style="background:rgba(255,0,0,.1);border-color:#f00;">
                        <span>WW</span>
                        <input type="number" min="0" value="${item.wwCount ?? 2}" onchange="updateWaschrinneWater(${i},'ww',this.value)" style="color:#f00;">
                    </div>`;
            } else {
                controlsHTML = `
                    <button type="button" class="toggle-btn kw ${item.kw ? 'active' : ''}" onclick="toggleWater(${i},'kw')">KW</button>
                    <button type="button" class="toggle-btn ww ${item.ww ? 'active' : ''}" onclick="toggleWater(${i},'ww')">WW</button>`;
            }

            li.innerHTML = `
                <div class="item-name">${escapeHTML(item.name)}</div>
                <div class="item-controls">
                    ${controlsHTML}
                    <button type="button" class="trash-btn" onclick="removeSanitaryObject(${i})" aria-label="Entfernen">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>`;
            list.appendChild(li);
        });
    }

    // ─── Nativer PDF / Druck Export (Modernes Design) ──────────────────────────
    function printNativeReport(summaryOnly) {
        if (buildingAreas.length === 0) { 
            showToast('Keine Bereiche zum Drucken', 'error'); 
            return; 
        }

        const projektName = document.getElementById('projektName').value.trim() || 'Unbenanntes Projekt';
        const datum       = document.getElementById('currentDate').textContent;
        const { total: totalObjects, kw: totalKW, ww: totalWW } = calcStats();
        const printContainer = document.getElementById('print-container');

        let html = `
            <div class="print-header">
                <div>
                    <div style="font-size: 12px; color: #ff0000; font-weight: 800; text-transform: uppercase; margin-bottom: 4px;">ProtocolApp</div>
                    <h1>${escapeHTML(projektName)}</h1>
                </div>
                <div class="meta">
                    Datum: <strong>${escapeHTML(datum)}</strong><br>
                    ${summaryOnly ? 'Mengenübersicht' : 'Komplettes Protokoll'}
                </div>
            </div>
        `;

        buildingAreas.forEach(area => {
            html += `<div class="print-area-card">`;
            html += `<div class="print-area-header">${escapeHTML(area.name || 'Ohne Name')}</div>`;
            html += `<div class="print-area-content">`;

            if (area.items.length > 0) {
                html += `
                <table class="print-table">
                    <thead>
                        <tr>
                            <th style="width: 65%;">Entnahmestelle</th>
                            <th style="width: 35%;">Anschlussart</th>
                        </tr>
                    </thead>
                    <tbody>`;

                area.items.forEach(item => {
                    let detail = '', badges = [];
                    if (item.name === 'Waschrinne') {
                        detail = ` <span style="color:#777; font-size:12px; font-weight:500;">(${item.zapfstellen ?? 2} Zapfst.)</span>`;
                        if ((item.kwCount ?? 2) > 0) badges.push(`<span class="badge-kw">${item.kwCount ?? 2}x KW</span>`);
                        if ((item.wwCount ?? 2) > 0) badges.push(`<span class="badge-ww">${item.wwCount ?? 2}x WW</span>`);
                    } else {
                        if (item.kw) badges.push(`<span class="badge-kw">KW</span>`);
                        if (item.ww) badges.push(`<span class="badge-ww">WW</span>`);
                    }

                    html += `
                    <tr>
                        <td><strong>${escapeHTML(item.name)}</strong>${detail}</td>
                        <td>${badges.length ? badges.join(' ') : '–'}</td>
                    </tr>`;
                });
                html += `</tbody></table>`;
            } else {
                html += `<p style="font-size: 14px; color: #777; margin-top: 10px;">Keine Komponenten erfasst.</p>`;
            }

            if (!summaryOnly && area.notes?.trim()) {
                html += `<div class="print-notes"><strong>Notizen:</strong><br>${escapeHTML(area.notes).replace(/\n/g, '<br>')}</div>`;
            }

            if (!summaryOnly && area.photos?.length) {
                html += `<div class="print-photo-grid">`;
                area.photos.forEach(p => {
                    html += `
                    <div class="print-photo">
                        <img src="${p.data}">
                        <div class="print-photo-note">${escapeHTML(p.note)}</div>
                    </div>`;
                });
                html += `</div>`;
            }
            html += `</div></div>`;
        });

        // Gesamtauswertung
        html += `
            <div class="print-summary">
                <h2>Gesamtauswertung</h2>
                <div class="print-summary-row">
                    <span>Erfasste Bereiche</span>
                    <span class="print-summary-val">${buildingAreas.length}</span>
                </div>
                <div class="print-summary-row">
                    <span>Komponenten gesamt</span>
                    <span class="print-summary-val">${totalObjects}</span>
                </div>
                <div class="print-summary-row" style="color: #2563eb;">
                    <span>Kaltwasser (KW)</span>
                    <span class="print-summary-val">${totalKW}x</span>
                </div>
                <div class="print-summary-row" style="color: #dc2626;">
                    <span>Warmwasser (WW)</span>
                    <span class="print-summary-val">${totalWW}x</span>
                </div>
            </div>
        `;

        printContainer.innerHTML = html;

        setTimeout(() => {
            window.print();
        }, 300);
    }

                    <td><strong>Komponenten gesamt</strong></td>
                    <td><strong>${totalObjects}</strong></td>
                </tr>
                <tr>
                    <td class="kw">Kaltwasser-Anschlüsse (KW)</td>
                    <td class="kw"><strong>${totalKW}x</strong></td>
                </tr>
                <tr>
                    <td class="ww">Warmwasser-Anschlüsse (WW)</td>
                    <td class="ww"><strong>${totalWW}x</strong></td>
                </tr>
            </table>
        </body>
        </html>`;

        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        
        const safeFilename = projektName.replace(/[^\w\säöüÄÖÜß\-]/g, '_').replace(/\s+/g, '_') || 'Protokoll';
        link.href = url;
        link.download = `${safeFilename}${summaryOnly ? '_Uebersicht' : ''}.doc`;
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    // ─── KEYBOARD ACCESSIBILITY ────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && document.getElementById('areaModal').classList.contains('active'))
            closeModal();
    });

    // ─── APP BOOT ──────────────────────────────────────────────────────────────
    window.onload = () => { loadData(); initSanitarGrid(); };

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () =>
            navigator.serviceWorker.register('./sw.js').catch(e => console.error('SW:', e))
        );
    }
    </script>
